# /etc/nginx/sites-available/dalybms
# À linker vers sites-enabled puis nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;

    server_name dalybms.local *.dalybms.local;   # adapte à ton domaine / IP

    # Redirection HTTP → HTTPS (décommente quand HTTPS est configuré)
    # return 301 https://$host$request_uri;

    # Logs séparés
    access_log /var/log/nginx/dalybms_access.log;
    error_log  /var/log/nginx/dalybms_error.log warn;

    # === Dashboard React statique (SPA) ===
    location / {
        root /opt/dalybms/frontend/dist;           # chemin du build npm run build
        try_files $uri $uri/ /index.html;          # support SPA routing
        expires 30d;
        add_header Cache-Control "public";
    }

    # === API Axum + WebSocket ===
    location ~ ^/(api|ws)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (indispensable pour /ws/bms/stream)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;          # longues connexions WS
        proxy_send_timeout 86400;

        # Timeout raisonnable pour polling / requêtes API
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # === Optionnel : Grafana, InfluxDB, Node-RED (si proxifiés) ===
    # location /grafana/ {
    #     proxy_pass http://127.0.0.1:3001/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # === Sécurité de base ===
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Désactive les traces serveur (sécurité)
    server_tokens off;
}

