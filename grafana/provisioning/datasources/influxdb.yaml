# =============================================================================
# Grafana — Provisioning datasource InfluxDB 2.x (Flux)
# =============================================================================
# Ce fichier est monté en lecture seule dans /etc/grafana/provisioning/datasources/

apiVersion: 1

datasources:
  - name: InfluxDB-DalyBMS
    type: influxdb
    uid: influxdb-dalybms
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    editable: true

    jsonData:
      version: Flux
      organization: santuario
      defaultBucket: daly_bms
      timeInterval: "10s"

    secureJsonData:
      token: $INFLUX_TOKEN
