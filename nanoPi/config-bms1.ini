; ─────────────────────────────────────────────────────────────────────────────
; dbus-mqtt-battery — Instance 41 — BMS 1 (adresse RS485 0x01)
; Copier vers : /data/etc/dbus-mqtt-battery-41/config.ini
; GitHub : https://github.com/mr-manuel/venus-os_dbus-mqtt-battery
; ─────────────────────────────────────────────────────────────────────────────
; DÉPLOIEMENT RAPIDE :
;   cat > /data/etc/dbus-mqtt-battery-41/config.ini << 'EOF'
;   (coller ce fichier)
;   EOF
;   svc -t /service/dbus-mqtt-battery-41
; ─────────────────────────────────────────────────────────────────────────────

[DEFAULT]
logging = WARNING
device_name = MQTT Battery 360Ah
device_instance = 141
; timeout = 0 désactive la déconnexion automatique (recommandé pour éviter les faux timeouts)
timeout = 0

[MQTT]
; 192.168.1.120 = IP du NanoPi (broker FlashMQ local)
; Utiliser 127.0.0.1 est équivalent et plus fiable (évite les délais réseau au boot)
broker_address = 127.0.0.1
broker_port = 1883
topic = santuario/bms/1/venus
;username =
;password =
