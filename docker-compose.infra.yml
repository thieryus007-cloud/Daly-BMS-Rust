# docker-compose.infra.yml
# Infrastructure de base pour DalyBMS (Mosquitto + InfluxDB)
# Phase 1 — ces services tournent en Docker, le serveur principal (Rust ou Python) est natif

services:

  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: dalybms-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"       # MQTT standard
      - "9001:9001"       # MQTT over WebSocket (pour Node-RED si besoin)
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  influxdb:
    image: influxdb:2.7.10
    container_name: dalybms-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USER:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:-supersecret}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG:-santuario}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET:-daly_bms}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"


volumes:
  mosquitto-data:
  mosquitto-log:
  influxdb-data:
  influxdb-config:
