<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervision Globale + ATS (Container)</title>
    
    <!-- Dépendances -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/reactflow@11.10.1/dist/umd/index.js"></script>
    <link href="https://unpkg.com/reactflow@11.10.1/dist/style.css" rel="stylesheet" />
    
    <style>
        /* Styles identiques à l'original (conservés) */
        :root {
            --bg-page: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --bg-card: #ffffff; --bg-card-subtle: #f8fafc;
            --text-primary: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
            --border-color: #e2e8f0; --border-focus: #3b82f6;
            --color-primary: #2563eb; --color-primary-hover: #1d4ed8;
            --color-success: #10b981; --color-success-bg: rgba(16, 185, 129, 0.12);
            --color-warning: #f59e0b; --color-warning-bg: rgba(245, 158, 11, 0.12);
            --color-danger: #ef4444; --color-danger-bg: rgba(239, 68, 68, 0.12);
            --color-ats: #6366f1;
            --icon-reseau: linear-gradient(135deg, #0ea5e9, #38bdf8);
            --icon-onduleur: linear-gradient(135deg, #7c3aed, #a78bfa);
            --icon-ats: linear-gradient(135deg, #2563eb, #60a5fa);
            --shadow-md: 0 2px 4px -1px rgb(0 0 0 / 0.05);
            --radius-sm: 4px; --radius-md: 6px; --radius-lg: 9px;
            --edge-active: #10b981; --edge-ats: #6366f1;
        }
        [data-theme="dark"] {
            --bg-page: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --bg-card: #1e293b; --bg-card-subtle: #334155;
            --text-primary: #f1f5f9; --text-secondary: #cbd5e1; --text-muted: #64748b;
            --border-color: #334155; --border-focus: #60a5fa;
            --color-primary: #3b82f6; --color-primary-hover: #60a5fa;
            --color-success: #34d399; --color-success-bg: rgba(52, 211, 153, 0.15);
            --color-warning: #fbbf24; --color-warning-bg: rgba(251, 191, 36, 0.15);
            --color-danger: #f87171; --color-danger-bg: rgba(248, 113, 113, 0.15);
            --color-ats: #818cf8;
            --icon-reseau: linear-gradient(135deg, #38bdf8, #7dd3fc);
            --icon-onduleur: linear-gradient(135deg, #a78bfa, #c4b5fd);
            --icon-ats: linear-gradient(135deg, #60a5fa, #93c5fd);
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg-page); color: var(--text-primary); }
        #root { width: 100vw; height: 100vh; position: relative; }
        #loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text-secondary); }
        
        .pro-node { width: 195px; background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border-color); box-shadow: var(--shadow-md); display: flex; flex-direction: column; overflow: hidden; font-size: 9px; line-height: 1.25; position: relative; }
        .pro-node.active-source { border: 2px solid var(--color-success); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15), var(--shadow-md); }
        .node-banner { display: flex; align-items: center; justify-content: space-between; padding: 5px 8px; background: var(--bg-card-subtle); border-bottom: 1px solid var(--border-color); gap: 6px; }
        .banner-left { display: flex; align-items: center; gap: 5px; font-weight: 600; font-size: 10px; }
        .banner-icon { width: 18px; height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; }
        .banner-icon.reseau { background: var(--icon-reseau); } .banner-icon.onduleur { background: var(--icon-onduleur); }
        .banner-center { display: flex; flex-direction: column; align-items: center; gap: 1px; flex: 1; }
        .banner-volt { font-size: 12px; font-weight: 700; font-family: monospace; color: var(--text-primary); }
        .banner-volt-unit { font-size: 9px; color: var(--text-muted); margin-left: 1px; }
        .banner-status { display: flex; align-items: center; gap: 3px; font-size: 8px; font-weight: 500; }
        .banner-status.online { color: var(--color-success); } .banner-status.offline { color: var(--text-muted); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-success); }
        .status-dot.off { background: var(--text-muted); }
        .banner-badge { padding: 2px 5px; border-radius: 10px; font-size: 8px; font-weight: 600; }
        .badge-ok { background: var(--color-success-bg); color: var(--color-success); }
        .badge-warn { background: var(--color-warning-bg); color: var(--color-warning); }
        .volt-bar-row { height: 3px; background: var(--border-color); margin: 0; }
        .volt-bar-fill { height: 100%; transition: width 0.2s; }
        .volt-bar-fill.ok { background: var(--color-success); } .volt-bar-fill.warn { background: var(--color-warning); }
        .data-strip { display: grid; grid-template-columns: repeat(4, 1fr); padding: 4px 6px; gap: 3px; background: var(--bg-card-subtle); }
        .data-chip { background: var(--bg-card); padding: 3px 2px; border-radius: var(--radius-sm); text-align: center; border: 1px solid var(--border-color); }
        .data-chip-label { font-size: 7px; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 1px; }
        .data-chip-value { font-size: 9px; font-weight: 600; font-family: monospace; }
        .data-chip-value.ok { color: var(--color-success); }
        .node-footer { padding: 5px 8px 6px; border-top: 1px solid var(--border-color); background: var(--bg-card); }
        .btn-force { width: 42%; margin: 0 auto; padding: 3px 6px; border: none; border-radius: var(--radius-md); font-size: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 3px; }
        .btn-force:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-warn { background: var(--color-warning); color: white; }
        .btn-prim { background: var(--color-primary); color: white; }
        .btn-danger { background: var(--color-danger); color: white; }
        .ats-node .node-head { border-bottom: 2px solid var(--color-ats); }
        .ats-sw { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 0 8px 4px; }
        .sw-card { background: var(--bg-card-subtle); border-radius: var(--radius-md); padding: 3px 5px; display: flex; align-items: center; justify-content: space-between; gap: 3px; border: 1px solid var(--border-color); }
        .sw-label { font-size: 7px; color: var(--text-muted); text-transform: uppercase; }
        .sw-val { font-size: 9px; font-weight: 700; }
        .sw-val.closed { color: var(--color-success); } .sw-val.open { color: var(--text-muted); }
        .info-row { display: flex; justify-content: space-between; padding: 3px 8px; border-bottom: 1px dashed var(--border-color); font-size: 8px; }
        .info-row:last-child { border-bottom: none; }
        .info-key { color: var(--text-muted); } .info-val { font-weight: 600; }
        .info-val.err { color: var(--color-danger); } .info-val.ok { color: var(--color-success); }
        .info-row-combined { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 3px 8px; border-bottom: 1px dashed var(--border-color); font-size: 8px; }
        .toggle-compact { position: relative; width: 24px; height: 12px; background: var(--border-color); border-radius: 12px; cursor: pointer; }
        .toggle-compact.on { background: var(--color-success); }
        .toggle-compact::after { content: ""; position: absolute; width: 10px; height: 10px; background: white; border-radius: 50%; top: 1px; left: 1px; transition: 0.2s; }
        .toggle-compact.on::after { transform: translateX(12px); }
        .node-foot { padding: 5px 8px 6px; border-top: 1px solid var(--border-color); background: var(--bg-card-subtle); display: flex; flex-direction: column; gap: 4px; }
        .react-flow__handle { opacity: 0; transition: 0.2s; width: 8px !important; height: 8px !important; background: var(--color-success) !important; border: 1px solid var(--bg-card) !important; }
        .pro-node:hover .react-flow__handle { opacity: 0.8; }
        .handle-right { right: -4px !important; } .handle-top { top: -4px !important; } .handle-left { left: -4px !important; } .handle-bottom { bottom: -4px !important; }
        .react-flow__node { padding: 0; border: none; background: transparent; }
        .react-flow__edge-path { stroke-width: 2; stroke-dasharray: 4 4; animation: dash-flow 1s linear infinite; opacity: 0.7; }
        @keyframes dash-flow { to { stroke-dashoffset: -8; } }
        .top-bar { position: absolute; top: 10px; left: 10px; z-index: 1000; background: var(--bg-card); padding: 6px 12px; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); display: flex; gap: 8px; align-items: center; border: 1px solid var(--border-color); }
        .top-bar a { text-decoration: none; color: var(--color-primary); font-weight: 500; font-size: 9px; }
        .bar-sep { width: 1px; height: 12px; background: var(--border-color); }
        .theme-toggle { background: var(--bg-card-subtle); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 3px 6px; font-size: 8px; cursor: pointer; }
        /* Style pour les nodes globaux (exemple) */
        .global-node { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 8px; width: 150px; text-align: center; font-size: 11px; box-shadow: var(--shadow-md); }
    </style>
</head>
<body>
    <div id="root">
        <div id="loading">⏳ Chargement de la supervision globale...</div>
    </div>

    <script type="text/babel">
        // ==================== Vérification des librairies ====================
        if (!window.React || !window.ReactDOM || !window.ReactFlow) {
            document.getElementById('loading').innerHTML = '<span style="color:red">❌ Échec du chargement des librairies.</span>';
            throw new Error("Libraries missing");
        }

        const { useState, useEffect, useCallback, useMemo } = React;
        const RF = window.ReactFlow;
        const ReactFlow = RF.ReactFlow || RF.default || RF;
        const Controls = RF.Controls || RF;
        const Background = RF.Background || RF;
        const MarkerType = RF.MarkerType || {};
        const Handle = RF.Handle || RF;
        const Position = RF.Position || {};
        const ReactFlowProvider = RF.ReactFlowProvider || (({children}) => children); // fallback

        // ==================== Node Components (identiques à l'original) ====================
        const ReseauNode = ({ data }) => {
            const active = data.sw2 === 'Fermé' || data.sw2 === '✅ Fermé';
            const connected = (parseInt(data.v2a)||0) > 50;
            const status = (data.s2a||"").toLowerCase();
            const badgeClass = status.includes("normal") ? "badge-ok" : "badge-warn";
            const badgeTxt = status.includes("normal") ? "✓ OK" : "⚠";
            const vClass = status.includes("normal") ? "ok" : "warn";
            const vLevel = Math.min(100, Math.max(0, ((parseInt(data.v2a)||0) / 400) * 100));

            return (
                <div className={`pro-node ${active ? 'active-source' : ''}`}>
                    <Handle type="source" position={Position.Right} id="reseau-out" className="handle-right" />
                    <div className="node-banner">
                        <div className="banner-left"><div className="banner-icon reseau">⚡</div><span>Réseau</span></div>
                        <div className="banner-center">
                            <span className="banner-volt">{data.v2a || '--'}<span className="banner-volt-unit"></span></span>
                            <span className={`banner-status ${connected ? 'online' : 'offline'}`}>
                                <span className={`status-dot ${connected ? '' : 'off'}`}></span>
                                {connected ? 'En ligne' : 'Hors ligne'}
                            </span>
                        </div>
                        <span className={`banner-badge ${badgeClass}`}>{badgeTxt}</span>
                    </div>
                    <div className="volt-bar-row"><div className={`volt-bar-fill ${vClass}`} style={{width: `${vLevel}%`}}></div></div>
                    <div className="data-strip">
                        <div className="data-chip"><span className="data-chip-label">SW2</span><span className={`data-chip-value ${active?'ok':''}`}>{data.sw2||'--'}</span></div>
                        <div className="data-chip"><span className="data-chip-label">Max</span><span className="data-chip-value">{data.max2||'--'}</span></div>
                        <div className="data-chip"><span className="data-chip-label">Nbr</span><span className="data-chip-value">{data.cnt2||0}</span></div>
                        <div className="data-chip"><span className="data-chip-label">T2</span><span className="data-chip-value">{data.t2||0}</span></div>
                    </div>
                    <div className="node-footer">
                        <button className="btn-force btn-warn" onClick={()=>data.onForce?.(2)} disabled={data.disabled}>
                            ⚡ {data.disabled ? '...' : 'ACTIVER'}
                        </button>
                    </div>
                </div>
            );
        };

        const OnduleurNode = ({ data }) => {
            const active = data.sw1 === 'Fermé' || data.sw1 === '✅ Fermé';
            const connected = (parseInt(data.v1a)||0) > 50;
            const status = (data.s1a||"").toLowerCase();
            const badgeClass = status.includes("normal") ? "badge-ok" : "badge-warn";
            const badgeTxt = status.includes("normal") ? "✓ OK" : "⚠";
            const vClass = status.includes("normal") ? "ok" : "warn";
            const vLevel = Math.min(100, Math.max(0, ((parseInt(data.v1a)||0) / 400) * 100));

            return (
                <div className={`pro-node ${active ? 'active-source' : ''}`}>
                    <Handle type="source" position={Position.Top} id="onduleur-out" className="handle-top" />
                    <div className="node-banner">
                        <div className="banner-left"><div className="banner-icon onduleur">🔋</div><span>Onduleur</span></div>
                        <div className="banner-center">
                            <span className="banner-volt">{data.v1a || '--'}<span className="banner-volt-unit"></span></span>
                            <span className={`banner-status ${connected ? 'online' : 'offline'}`}>
                                <span className={`status-dot ${connected ? '' : 'off'}`}></span>
                                {connected ? 'En ligne' : 'Hors ligne'}
                            </span>
                        </div>
                        <span className={`banner-badge ${badgeClass}`}>{badgeTxt}</span>
                    </div>
                    <div className="volt-bar-row"><div className={`volt-bar-fill ${vClass}`} style={{width: `${vLevel}%`}}></div></div>
                    <div className="data-strip">
                        <div className="data-chip"><span className="data-chip-label">SW1</span><span className={`data-chip-value ${active?'ok':''}`}>{data.sw1||'--'}</span></div>
                        <div className="data-chip"><span className="data-chip-label">Max</span><span className="data-chip-value">{data.max1||'--'}</span></div>
                        <div className="data-chip"><span className="data-chip-label">Nbr</span><span className="data-chip-value">{data.cnt1||0}</span></div>
                        <div className="data-chip"><span className="data-chip-label">T1</span><span className="data-chip-value">{data.t1||0}</span></div>
                    </div>
                    <div className="node-footer">
                        <button className="btn-force btn-prim" onClick={()=>data.onForce?.(1)} disabled={data.disabled}>
                            🔋 {data.disabled ? '...' : 'ACTIVER'}
                        </button>
                    </div>
                </div>
            );
        };

        const ATSNode = ({ data }) => {
            const remoteOn = data.swRemote === "📡 Activé" || data.swRemote === "Activé";
            const hasFault = (data.swFault||"Aucun") !== "Aucun";
            const centerOff = (data.middleOFF||"").includes('Activé');

            return (
                <div className="pro-node ats-node">
                    <Handle type="target" position={Position.Left} id="ats-in-reseau" className="handle-left" />
                    <Handle type="target" position={Position.Bottom} id="ats-in-onduleur" className="handle-bottom" />
                    <div className="node-head" style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'5px 8px', background:'var(--bg-card-subtle)', borderBottom:'2px solid var(--color-ats)', gap:5}}>
                        <div style={{display:'flex', alignItems:'center', gap:4, fontWeight:600, fontSize:10}}>
                            <div style={{width:18, height:18, background:'var(--icon-ats)', borderRadius:4, display:'flex', alignItems:'center', justifyContent:'center', color:'white', fontSize:11}}>🔀</div>
                            <span>ATS</span>
                        </div>
                        <div style={{display:'flex', alignItems:'center', gap:4, cursor: data.disabled ? 'default' : 'pointer', opacity: data.disabled ? 0.5 : 1}} onClick={!data.disabled ? data.onToggleRemote : undefined}>
                            <span style={{fontSize:8, color:'var(--text-secondary)'}}>Télécomande</span>
                            <div className={`toggle-compact ${remoteOn?'on':''}`}></div>
                        </div>
                        <span className={`banner-badge ${remoteOn?'badge-ok':'badge-warn'}`}>{remoteOn?"📡 ON":" OFF"}</span>
                    </div>
                    <div className="ats-sw">
                        <div className="sw-card"><span className="sw-label">SW1</span><span className={`sw-val ${(data.sw1||'').includes('Fermé')?'closed':'open'}`}>{data.sw1||'Ouvert'}</span></div>
                        <div className="sw-card"><span className="sw-label">SW2</span><span className={`sw-val ${(data.sw2||'').includes('Fermé')?'closed':'open'}`}>{data.sw2||'Ouvert'}</span></div>
                    </div>
                    <div className="info-row-combined">
                        <div className="info-row"><span className="info-key">Mode</span><span className="info-val">{data.swMode||'---'}</span></div>
                        <div className="info-row"><span className="info-key">Défaut</span><span className={`info-val ${hasFault?'err':'ok'}`}>{hasFault?"⚠ Erreur":"✓ Aucun"}</span></div>
                    </div>
                    <div className="info-row"><span className="info-key">Position</span><span className={`info-val ${centerOff?'err':''}`}>{data.middleOFF||'Normale'}</span></div>
                    <div className="node-foot">
                        <button className="btn-force btn-danger" onClick={data.onForceOff} disabled={data.disabled}>
                            ⏹️ {data.disabled ? '...' : 'Double OFF'}
                        </button>
                    </div>
                </div>
            );
        };

        const nodeTypes = { reseau: ReseauNode, onduleur: OnduleurNode, ats: ATSNode };

        // ==================== Composant Container ATS ====================
        // Ce composant encapsule toute la logique ATS et expose les nodes/edges via des props.
        // Il peut être placé n'importe où, il ne rend rien visuellement (return null),
        // il transmet simplement les données calculées à un composant parent via render props ou context.
        // Ici nous utilisons une fonction "children" pour plus de flexibilité.
        const ATSContainer = ({ children, basePositions = { reseau: {x: -250, y: 60}, ats: {x: 0, y: 60}, onduleur: {x: 0, y: 240} } }) => {
            const [isProcessing, setIsProcessing] = useState(false);
            const [apiData, setApiData] = useState({ 
                v1a:'0',v2a:'0',sw1:'Ouvert',sw2:'Ouvert',s1a:'Normal',s2a:'Normal',
                swRemote:'Désactivé',swMode:'Auto',swFault:'Aucun',middleOFF:'Désactivé',operation_mode:'N/A',
                cnt1:'0',cnt2:'0',t1:'0',t2:'0',max1:'400',max2:'400'
            });

            // Fetch API
            const fetchData = useCallback(async () => {
                try { 
                    const r = await fetch('/api/read_all', { cache: 'no-cache' }); 
                    const j = await r.json(); 
                    if(j.success && j.values) setApiData(prev => ({...prev, ...j.values})); 
                } catch(e) {} 
            }, []);

            // Commandes
            const executeCommand = async (steps) => {
                if (isProcessing) return;
                setIsProcessing(true);
                try {
                    for (const step of steps) { 
                        if (typeof step === 'string') await fetch('/api/' + step, { method: 'POST', cache: 'no-cache' }); 
                        else if (typeof step === 'number') await new Promise(r => setTimeout(r, step)); 
                    }
                    await new Promise(r => setTimeout(r, 600));
                    await fetchData();
                } finally { setIsProcessing(false); }
            };

            const handleForceSource = async(id) => { 
                await executeCommand(['remote_on', 200, id===1?'force_source1':'force_source2', 'remote_off']); 
            };
            const handleToggleRemote = async() => { 
                const isOn = apiData.swRemote.includes("Activé"); 
                await executeCommand([isOn ? 'remote_off' : 'remote_on', 300]); 
            };
            const handleForceOff = async() => { 
                if(window.confirm("⚠️ Confirmer Double OFF ?")) await executeCommand(['remote_on', 200, 'force_double', 'remote_off']); 
            };

            // Polling
            useEffect(() => { 
                fetchData(); 
                const id = setInterval(fetchData, 5000); 
                return () => clearInterval(id); 
            }, [fetchData]);

            // Construction des nodes ATS avec données et callbacks
            const atsNodes = useMemo(() => {
                const baseNodes = [
                    { id: 'reseau', type: 'reseau', position: basePositions.reseau },
                    { id: 'ats', type: 'ats', position: basePositions.ats },
                    { id: 'onduleur', type: 'onduleur', position: basePositions.onduleur }
                ];
                return baseNodes.map(n => {
                    const nodeData = { ...apiData, disabled: isProcessing };
                    if (n.id === 'reseau') nodeData.onForce = () => handleForceSource(2);
                    else if (n.id === 'onduleur') nodeData.onForce = () => handleForceSource(1);
                    else if (n.id === 'ats') {
                        nodeData.onToggleRemote = handleToggleRemote;
                        nodeData.onForceOff = handleForceOff;
                    }
                    return { ...n, data: nodeData };
                });
            }, [apiData, isProcessing, basePositions]);

            // Edges ATS (dynamiques)
            const sw1C = (apiData.sw1||"").includes("Fermé");
            const sw2C = (apiData.sw2||"").includes("Fermé");
            const midOff = (apiData.middleOFF||"").includes("Activé");
            const atsEdges = useMemo(() => {
                if(midOff) return [];
                const e = [];
                if(sw1C && !sw2C) e.push({id:'e1',source:'onduleur',target:'ats',sourceHandle:'onduleur-out',targetHandle:'ats-in-onduleur',animated:true,style:{stroke:'var(--edge-active)',strokeWidth:2,strokeDasharray:'4 4'},markerEnd:{type:MarkerType.ArrowClosed,color:'var(--edge-active)',width:12,height:12},type:'smoothstep'});
                else if(sw2C && !sw1C) e.push({id:'e2',source:'reseau',target:'ats',sourceHandle:'reseau-out',targetHandle:'ats-in-reseau',animated:true,style:{stroke:'var(--edge-active)',strokeWidth:2,strokeDasharray:'4 4'},markerEnd:{type:MarkerType.ArrowClosed,color:'var(--edge-active)',width:12,height:12},type:'smoothstep'});
                else if(sw1C && sw2C) e.push(
                    {id:'e1',source:'onduleur',target:'ats',sourceHandle:'onduleur-out',targetHandle:'ats-in-onduleur',animated:true,style:{stroke:'var(--edge-active)',strokeWidth:2,strokeDasharray:'4 4'},markerEnd:{type:MarkerType.ArrowClosed,color:'var(--edge-active)',width:12,height:12},type:'smoothstep'},
                    {id:'e2',source:'reseau',target:'ats',sourceHandle:'reseau-out',targetHandle:'ats-in-reseau',animated:true,style:{stroke:'var(--edge-ats)',strokeWidth:2,strokeDasharray:'4 4'},markerEnd:{type:MarkerType.ArrowClosed,color:'var(--edge-ats)',width:12,height:12},type:'smoothstep'}
                );
                return e;
            }, [sw1C, sw2C, midOff]);

            // Expose via children function
            return children({ atsNodes, atsEdges, apiData, isProcessing });
        };

        // ==================== Page Globale ====================
        function GlobalVisualization() {
            const [theme, setTheme] = useState(() => localStorage.getItem('ats-theme') || 'light');
            useEffect(() => { 
                document.documentElement.setAttribute('data-theme', theme); 
                localStorage.setItem('ats-theme', theme); 
            }, [theme]);

            // ----- 14 nœuds existants (exemple) -----
            const globalNodes = useMemo(() => {
                const nodes = [];
                // Création de 14 nodes factices disposés en grille
                for (let i = 0; i < 14; i++) {
                    const row = Math.floor(i / 5);
                    const col = i % 5;
                    nodes.push({
                        id: `global-${i}`,
                        type: 'default', // type par défaut de React Flow
                        position: { x: 300 + col * 200, y: 100 + row * 150 },
                        data: { label: `Équipement ${i+1}` },
                        style: { width: 150, padding: 10, background: 'var(--bg-card)', border: '1px solid var(--border-color)', borderRadius: 'var(--radius-md)' }
                    });
                }
                return nodes;
            }, []);

            // Exemple d'edges animés entre certains nœuds globaux
            const globalEdges = useMemo(() => {
                const edges = [];
                // Quelques connections pour illustrer
                for (let i = 0; i < 13; i+=3) {
                    edges.push({
                        id: `global-e-${i}`,
                        source: `global-${i}`,
                        target: `global-${i+1}`,
                        animated: true,
                        style: { stroke: '#94a3b8', strokeWidth: 2, strokeDasharray: '4 4' },
                        markerEnd: { type: MarkerType.ArrowClosed, color: '#94a3b8' }
                    });
                }
                return edges;
            }, []);

            return (
                <ReactFlowProvider>
                    <div style={{ width: '100%', height: '100%' }}>
                        <div className="top-bar">
                            <span style={{color:'var(--text-secondary)',fontSize:9}}>📊 Supervision Globale (14 + ATS)</span>
                            <div className="bar-sep"></div>
                            <button className="theme-toggle" onClick={()=>setTheme(t=>t==='light'?'dark':'light')}>
                                {theme==='light'?'🌙':'☀️'}
                            </button>
                        </div>

                        {/* Le conteneur ATS fournit ses nodes/edges */}
                        <ATSContainer>
                            {({ atsNodes, atsEdges }) => {
                                // Fusion des nodes et edges
                                const allNodes = [...globalNodes, ...atsNodes];
                                const allEdges = [...globalEdges, ...atsEdges];
                                
                                return (
                                    <ReactFlow
                                        nodes={allNodes}
                                        edges={allEdges}
                                        nodeTypes={nodeTypes}
                                        fitView
                                        fitViewOptions={{ padding: 0.2 }}
                                        defaultViewport={{ x: 0, y: 0, zoom: 0.7 }}
                                        nodesConnectable={false}
                                        nodesDraggable={true}
                                        panOnDrag
                                        zoomOnScroll
                                        minZoom={0.3}
                                        maxZoom={2}
                                        edgesConnectable={false}
                                    >
                                        <Background color="var(--border-color)" gap="12" size="0.5" />
                                        <Controls showInteractive={false} style={{boxShadow:'var(--shadow-md)',borderRadius:'var(--radius-md)',background:'var(--bg-card)',border:'1px solid var(--border-color)'}} />
                                    </ReactFlow>
                                );
                            }}
                        </ATSContainer>
                    </div>
                </ReactFlowProvider>
            );
        }

        // Rendu
        ReactDOM.createRoot(document.getElementById('root')).render(<GlobalVisualization />);
    </script>
</body>
</html>
