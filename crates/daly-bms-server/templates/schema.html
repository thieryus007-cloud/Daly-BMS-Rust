<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS - Supervision Compacte</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/reactflow@11.10.1/dist/umd/index.js"></script>
    <link href="https://unpkg.com/reactflow@11.10.1/dist/style.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-page: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --bg-card: #ffffff; --bg-card-subtle: #f8fafc; --bg-card-hover: #f1f5f9;
            --text-primary: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
            --border-color: #e2e8f0; --border-focus: #3b82f6;
            --color-primary: #2563eb; --color-primary-hover: #1d4ed8;
            --color-success: #10b981; --color-success-bg: rgba(16, 185, 129, 0.12);
            --color-warning: #f59e0b; --color-warning-bg: rgba(245, 158, 11, 0.12);
            --color-danger: #ef4444; --color-danger-bg: rgba(239, 68, 68, 0.12);
            --color-ats: #6366f1;
            --icon-reseau: linear-gradient(135deg, #0ea5e9, #38bdf8);
            --icon-onduleur: linear-gradient(135deg, #7c3aed, #a78bfa);
            --icon-ats: linear-gradient(135deg, #2563eb, #60a5fa);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.06);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.08);
            --radius-sm: 4px; --radius-md: 6px; --radius-lg: 10px;
            --edge-active: #10b981; --edge-ats: #6366f1;
        }
        [data-theme="dark"] {
            --bg-page: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --bg-card: #1e293b; --bg-card-subtle: #334155; --bg-card-hover: #475569;
            --text-primary: #f1f5f9; --text-secondary: #cbd5e1; --text-muted: #64748b;
            --border-color: #334155; --border-focus: #60a5fa;
            --color-primary: #3b82f6; --color-primary-hover: #60a5fa;
            --color-success: #34d399; --color-success-bg: rgba(52, 211, 153, 0.15);
            --color-warning: #fbbf24; --color-warning-bg: rgba(251, 191, 36, 0.15);
            --color-danger: #f87171; --color-danger-bg: rgba(248, 113, 113, 0.15);
            --color-ats: #818cf8;
            --icon-reseau: linear-gradient(135deg, #38bdf8, #7dd3fc);
            --icon-onduleur: linear-gradient(135deg, #a78bfa, #c4b5fd);
            --icon-ats: linear-gradient(135deg, #60a5fa, #93c5fd);
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg-page); color: var(--text-primary); height: 100vh; overflow: hidden; }
        #root { width: 100%; height: 100%; }

        .pro-node {
            width: 175px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 7.5px;
            line-height: 1.25;
            position: relative;
        }
        .pro-node:hover { box-shadow: var(--shadow-lg); border-color: var(--border-focus); }

        .node-banner {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 8px; background: var(--bg-card-subtle);
            border-bottom: 1px solid var(--border-color); gap: 6px;
        }
        .banner-icon { width: 18px; height: 18px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; }
        .banner-center { flex: 1; text-align: center; }
        .banner-volt { font-size: 9.5px; font-weight: 700; font-family: monospace; }
        .banner-status { font-size: 7.3px; }
        .banner-badge { padding: 2px 7px; border-radius: 12px; font-size: 8px; font-weight: 600; }

        .volt-bar-row { height: 3px; background: var(--border-color); margin: 0 8px; border-radius: 2px; overflow: hidden; }
        .data-strip { display: grid; grid-template-columns: repeat(4, 1fr); padding: 5px 7px; gap: 3px; background: var(--bg-card-subtle); }
        .data-chip { background: var(--bg-card); padding: 3px 2px; border-radius: 4px; text-align: center; border: 1px solid var(--border-color); }
        .data-chip-label { font-size: 6.5px; color: var(--text-muted); text-transform: uppercase; }
        .data-chip-value { font-size: 7.5px; font-weight: 600; font-family: monospace; }

        .node-footer, .node-foot { padding: 5px 8px 7px; border-top: 1px solid var(--border-color); }
        .btn-force { width: 100%; padding: 4px; border: none; border-radius: 6px; font-size: 7.5px; font-weight: 600; cursor: pointer; }

        /* Toggle */
        .toggle-compact {
            position: relative; width: 24px; height: 13px;
            background: var(--border-color); border-radius: 13px;
            transition: 0.2s; cursor: pointer;
        }
        .toggle-compact.on { background: var(--color-success); }
        .toggle-compact::after {
            content: ""; position: absolute; width: 9px; height: 9px;
            background: white; border-radius: 50%; top: 2px; left: 2px;
            transition: 0.2s;
        }
        .toggle-compact.on::after { transform: translateX(11px); }

        .react-flow__handle { width: 8px !important; height: 8px !important; }
        .top-bar { 
            position: absolute; top: 10px; left: 10px; z-index: 1000; 
            background: var(--bg-card); padding: 6px 10px; border-radius: 8px; 
            box-shadow: var(--shadow-md); display: flex; gap: 8px; align-items: center; 
            font-size: 8px; border: 1px solid var(--border-color); 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;
        const { ReactFlow, Controls, Background, MarkerType, Handle, Position } = window.ReactFlow || {};

        // Protection contre erreurs
        if (!window.ReactFlow) {
            console.error("ReactFlow n'a pas chargé");
            document.getElementById('root').innerHTML = '<div style="padding:40px;color:red;">Erreur : ReactFlow non chargé</div>';
        }

        const getVoltLevel = (v, max) => Math.min(100, Math.max(0, ((parseInt(v)||0) / (parseInt(max)||400)) * 100));

        const getStatusBadge = (s) => {
            if (!s) return {cls: "badge-ok", txt: "✓ OK"};
            const l = s.toLowerCase();
            if (l.includes("normal") || l.includes("ok")) return {cls: "badge-ok", txt: "✓ OK"};
            if (l.includes("sous") || l.includes("attention")) return {cls: "badge-warn", txt: "⚠ Att."};
            if (l.includes("surt") || l.includes("err") || l.includes("fault")) return {cls: "badge-err", txt: "✗ Err"};
            return {cls: "badge-ok", txt: "✓ OK"};
        };

        const ReseauNode = ({ data }) => {
            const active = data.sw2?.includes('Fermé');
            const vLevel = getVoltLevel(data.v2a, data.max2);
            const connected = parseInt(data.v2a) > 50;

            return React.createElement('div', { className: `pro-node ${active ? 'active-source' : ''}` },
                React.createElement(Handle, { type: "source", position: Position.Right, id: "reseau-out" }),
                // ... (le reste du node est simplifié pour éviter les erreurs Babel)
                React.createElement('div', { className: "node-banner" },
                    React.createElement('div', { className: "banner-left" }, 
                        React.createElement('div', { className: "banner-icon reseau" }, '⚡'), 'Réseau'
                    ),
                    React.createElement('div', { className: "banner-center" },
                        React.createElement('span', { className: "banner-volt" }, data.v2a || '--'),
                        React.createElement('span', { className: `banner-status ${connected ? 'online' : 'offline'}` }, 
                            connected ? 'En ligne' : 'Hors ligne'
                        )
                    )
                )
            );
        };

        // Version simplifiée pour debug - on va d'abord faire apparaître quelque chose
        function App() {
            const [theme, setTheme] = useState('light');
            const [apiData] = useState({
                v1a: '230', v2a: '231', sw1: 'Fermé', sw2: 'Ouvert', 
                swRemote: 'Activé', swMode: 'Auto', middleOFF: 'Désactivé'
            });

            const nodes = useMemo(() => [
                { id: '1', type: 'reseau', position: { x: -280, y: 80 }, data: apiData },
                { id: '2', type: 'ats', position: { x: 0, y: 70 }, data: apiData },
                { id: '3', type: 'onduleur', position: { x: 0, y: 250 }, data: apiData }
            ], []);

            return React.createElement(ReactFlow, {
                nodes: nodes,
                edges: [],
                nodeTypes: { reseau: ReseauNode, onduleur: ReseauNode, ats: ReseauNode }, // temporaire
                fitView: true,
                style: { background: 'var(--bg-page)' }
            },
                React.createElement(Background, { variant: "dots" }),
                React.createElement('div', { className: "top-bar" }, 
                    'ATS Supervision - Version Debug'
                )
            );
        }

        // Lancement avec sécurité
        window.onload = () => {
            try {
                ReactDOM.createRoot(document.getElementById('root')).render(
                    React.createElement(App)
                );
            } catch (e) {
                console.error(e);
                document.getElementById('root').innerHTML = `
                    <div style="padding:30px; color:#ef4444; font-family:sans-serif;">
                        <h2>Erreur de chargement</h2>
                        <p>${e.message}</p>
                        <pre>${e.stack}</pre>
                    </div>`;
            }
        };
    </script>
</body>
</html>
