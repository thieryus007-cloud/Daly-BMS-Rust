<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS - Supervision Compacte</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/reactflow@11.10.1/dist/umd/index.js"></script>
    <link href="https://unpkg.com/reactflow@11.10.1/dist/style.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-page: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --bg-card: #ffffff; --bg-card-subtle: #f8fafc; --bg-card-hover: #f1f5f9;
            --text-primary: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
            --border-color: #e2e8f0; --border-focus: #3b82f6;
            --color-primary: #2563eb; --color-primary-hover: #1d4ed8;
            --color-success: #10b981; --color-success-bg: rgba(16, 185, 129, 0.12);
            --color-warning: #f59e0b; --color-warning-bg: rgba(245, 158, 11, 0.12);
            --color-danger: #ef4444; --color-danger-bg: rgba(239, 68, 68, 0.12);
            --color-ats: #6366f1;
            --icon-reseau: linear-gradient(135deg, #0ea5e9, #38bdf8);
            --icon-onduleur: linear-gradient(135deg, #7c3aed, #a78bfa);
            --icon-ats: linear-gradient(135deg, #2563eb, #60a5fa);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.06);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.08);
            --radius-sm: 4px; --radius-md: 6px; --radius-lg: 10px;
            --edge-active: #10b981; --edge-ats: #6366f1;
        }
        [data-theme="dark"] {
            --bg-page: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --bg-card: #1e293b; --bg-card-subtle: #334155; --bg-card-hover: #475569;
            --text-primary: #f1f5f9; --text-secondary: #cbd5e1; --text-muted: #64748b;
            --border-color: #334155; --border-focus: #60a5fa;
            --color-primary: #3b82f6; --color-primary-hover: #60a5fa;
            --color-success: #34d399; --color-success-bg: rgba(52, 211, 153, 0.15);
            --color-warning: #fbbf24; --color-warning-bg: rgba(251, 191, 36, 0.15);
            --color-danger: #f87171; --color-danger-bg: rgba(248, 113, 113, 0.15);
            --color-ats: #818cf8;
            --icon-reseau: linear-gradient(135deg, #38bdf8, #7dd3fc);
            --icon-onduleur: linear-gradient(135deg, #a78bfa, #c4b5fd);
            --icon-ats: linear-gradient(135deg, #60a5fa, #93c5fd);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4), 0 2px 4px -2px rgb(0 0 0 / 0.3);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5), 0 4px 6px -4px rgb(0 0 0 / 0.4);
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg-page); color: var(--text-primary); }
        #root { width: 100%; height: 100%; }

        /* ==================== NODES COMPATCS ==================== */
        .pro-node {
            width: 175px;                    /* Réduction principale */
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: box-shadow 0.2s, border-color 0.2s, transform 0.1s;
            font-size: 7.5px;
            line-height: 1.25;
            position: relative;
        }
        .pro-node:hover { 
            box-shadow: var(--shadow-lg); 
            transform: translateY(-1px); 
            border-color: var(--border-focus); 
        }
        .pro-node.active-source { 
            border: 2px solid var(--color-success); 
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2), var(--shadow-lg); 
        }

        .node-banner {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 8px;
            background: var(--bg-card-subtle);
            border-bottom: 1px solid var(--border-color);
            gap: 6px;
        }
        .banner-left { display: flex; align-items: center; gap: 5px; font-weight: 600; flex-shrink: 0; }
        .banner-icon { 
            width: 18px; height: 18px; border-radius: 5px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 11px; color: white; 
        }
        .banner-center { display: flex; flex-direction: column; align-items: center; gap: 1px; flex: 1; }
        .banner-volt { font-size: 9.5px; font-weight: 700; font-family: monospace; color: var(--text-primary); }
        .banner-volt-unit { font-size: 7px; color: var(--text-muted); }
        .banner-status { font-size: 7.3px; font-weight: 500; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-success); }
        .status-dot.off { background: var(--text-muted); }
        .banner-badge { 
            padding: 2px 7px; border-radius: 12px; font-size: 8px; font-weight: 600; 
        }

        .volt-bar-row { 
            height: 3px; background: var(--border-color); border-radius: 2px; 
            margin: 0 8px; overflow: hidden; 
        }
        .volt-bar-fill { height: 100%; border-radius: 2px; transition: width 0.2s; }

        .data-strip { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            padding: 5px 7px; gap: 3px; 
            background: var(--bg-card-subtle); 
        }
        .data-chip { 
            background: var(--bg-card); padding: 3px 2px; border-radius: var(--radius-sm); 
            text-align: center; border: 1px solid var(--border-color); 
        }
        .data-chip-label { 
            font-size: 6.5px; color: var(--text-muted); text-transform: uppercase; 
            margin-bottom: 1px; letter-spacing: 0.3px; 
        }
        .data-chip-value { 
            font-size: 7.5px; font-weight: 600; font-family: monospace; 
        }

        .node-footer, .node-foot { 
            padding: 5px 8px 7px; 
            border-top: 1px solid var(--border-color); 
        }
        .btn-force { 
            width: 100%; padding: 4px 6px; border: none; border-radius: var(--radius-md); 
            font-size: 7.5px; font-weight: 600; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 3px; 
        }
        .btn-force:active { transform: scale(0.97); }
        .btn-warn { background: var(--color-warning); color: white; }
        .btn-prim { background: var(--color-primary); color: white; }
        .btn-danger { background: var(--color-danger); color: white; }

        /* ATS spécifique */
        .ats-sw { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 4px; 
            padding: 0 7px 5px; 
        }
        .sw-card { 
            background: var(--bg-card-subtle); border-radius: var(--radius-md); 
            padding: 3px 5px; border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; 
        }
        .sw-label { font-size: 6.5px; color: var(--text-muted); text-transform: uppercase; }
        .sw-val { font-size: 8.5px; font-weight: 700; }

        .info-row, .info-row-combined { 
            padding: 3px 8px; font-size: 7.5px; 
        }
        .info-row-combined { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; 
        }

        /* React Flow */
        .react-flow__handle { 
            width: 8px !important; height: 8px !important; 
        }
        .handle-right, .handle-top { background: var(--color-success) !important; box-shadow: 0 0 0 2px var(--bg-card) !important; }
        .handle-left, .handle-bottom { background: var(--color-ats) !important; box-shadow: 0 0 0 2px var(--bg-card) !important; }

        .react-flow__edge-path { 
            stroke-width: 2.5; 
            stroke-dasharray: 4 3; 
            animation: dash-flow 1.2s linear infinite; 
        }
        @keyframes dash-flow { to { stroke-dashoffset: -7; } }

        .top-bar { 
            position: absolute; top: 10px; left: 10px; z-index: 1000; 
            background: var(--bg-card); padding: 6px 10px; border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-md); display: flex; gap: 8px; align-items: center; 
            font-size: 8px; border: 1px solid var(--border-color); 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;
        const { ReactFlow, Controls, Background, MarkerType, Handle, Position } = window.ReactFlow;

        const getVoltLevel = (v, max) => Math.min(100, Math.max(0, ((parseInt(v)||0) / (parseInt(max)||400)) * 100));
        const getStatusBadge = (s) => {
            if(!s) return {cls:"badge-ok", txt:"✓ OK"};
            const l=s.toLowerCase();
            if(l.includes("normal")||l.includes("ok")) return {cls:"badge-ok", txt:"✓ OK"};
            if(l.includes("sous-tension")||l.includes("attention")) return {cls:"badge-warn", txt:"⚠ Attention"};
            if(l.includes("surtension")||l.includes("erreur")||l.includes("fault")) return {cls:"badge-err", txt:"✗ Erreur"};
            return {cls:"badge-ok", txt:"✓ OK"};
        };

        const ReseauNode = ({ data }) => {
            const active = data.sw2 === 'Fermé' || data.sw2 === '✅ Fermé';
            const status = data.s2a || "Normal";
            const badge = getStatusBadge(status);
            const vLevel = getVoltLevel(data.v2a, data.max2);
            const connected = (parseInt(data.v2a)||0) > 50;
            const vClass = status.toLowerCase().includes("normal") ? "ok" : status.toLowerCase().includes("sous") ? "warn" : "err";

            return (
                <div className={`pro-node ${active ? 'active-source' : ''}`}>
                    <Handle type="source" position={Position.Right} id="reseau-out" className="handle-right" />
                    <div className="node-banner">
                        <div className="banner-left"><div className="banner-icon reseau">⚡</div><span>Réseau</span></div>
                        <div className="banner-center">
                            <span className="banner-volt">{data.v2a || '--'}</span>
                            <span className={`banner-status ${connected ? 'online' : 'offline'}`}>
                                <span className={`status-dot ${connected ? '' : 'off'}`}></span>
                                {connected ? 'En ligne' : 'Hors ligne'}
                            </span>
                        </div>
                        <span className={`banner-badge ${badge.cls}`}>{badge.txt}</span>
                    </div>
                    <div className="volt-bar-row"><div className={`volt-bar-fill ${vClass}`} style={{width: `${vLevel}%`}}></div></div>
                    <div className="data-strip">
                        <div className="data-chip"><span className="data-chip-label">SW2</span><span className={`data-chip-value ${active?'ok':''}`}>{data.sw2||'--'}</span></div>
                        <div className="data-chip"><span className="data-chip-label">Max</span><span className="data-chip-value">{data.max2||'--'}</span></div>
                        <div className="data-chip"><span className="data-chip-label">Cnt</span><span className="data-chip-value">{data.cnt2||0}</span></div>
                        <div className="data-chip"><span className="data-chip-label">T2</span><span className="data-chip-value">{data.t2||0}s</span></div>
                    </div>
                    <div className="node-footer">
                        <button className="btn-force btn-warn" onClick={()=>data.onForce?.(2)} disabled={data.disabled}>
                            ⚡ {data.disabled ? '...' : 'Forcer Réseau'}
                        </button>
                    </div>
                </div>
            );
        };

        const OnduleurNode = ({ data }) => {
            const active = data.sw1 === 'Fermé' || data.sw1 === '✅ Fermé';
            const status = data.s1a || "Normal";
            const badge = getStatusBadge(status);
            const vLevel = getVoltLevel(data.v1a, data.max1);
            const connected = (parseInt(data.v1a)||0) > 50;
            const vClass = status.toLowerCase().includes("normal") ? "ok" : status.toLowerCase().includes("sous") ? "warn" : "err";

            return (
                <div className={`pro-node ${active ? 'active-source' : ''}`}>
                    <Handle type="source" position={Position.Top} id="onduleur-out" className="handle-top" />
                    <div className="node-banner">
                        <div className="banner-left"><div className="banner-icon onduleur">🔋</div><span>Onduleur</span></div>
                        <div className="banner-center">
                            <span className="banner-volt">{data.v1a || '--'}</span>
                            <span className={`banner-status ${connected ? 'online' : 'offline'}`}>
                                <span className={`status-dot ${connected ? '' : 'off'}`}></span>
                                {connected ? 'En ligne' : 'Hors ligne'}
                            </span>
                        </div>
                        <span className={`banner-badge ${badge.cls}`}>{badge.txt}</span>
                    </div>
                    <div className="volt-bar-row"><div className={`volt-bar-fill ${vClass}`} style={{width: `${vLevel}%`}}></div></div>
                    <div className="data-strip">
                        <div className="data-chip"><span className="data-chip-label">SW1</span><span className={`data-chip-value ${active?'ok':''}`}>{data.sw1||'--'}</span></div>
                        <div className="data-chip"><span className="data-chip-label">Max</span><span className="data-chip-value">{data.max1||'--'}</span></div>
                        <div className="data-chip"><span className="data-chip-label">Cnt</span><span className="data-chip-value">{data.cnt1||0}</span></div>
                        <div className="data-chip"><span className="data-chip-label">T1</span><span className="data-chip-value">{data.t1||0}s</span></div>
                    </div>
                    <div className="node-footer">
                        <button className="btn-force btn-prim" onClick={()=>data.onForce?.(1)} disabled={data.disabled}>
                            🔋 {data.disabled ? '...' : 'Forcer Onduleur'}
                        </button>
                    </div>
                </div>
            );
        };

        const ATSNode = ({ data }) => {
            const remoteOn = data.swRemote === "📡 Activé" || data.swRemote === "Activé";
            const fault = data.swFault || "Aucun";
            const hasFault = fault !== "Aucun" && fault !== "None";
            const centerOff = data.middleOFF?.includes('Activé');
            const disabled = data.disabled || false;

            return (
                <div className="pro-node ats-node">
                    <Handle type="target" position={Position.Left} id="ats-in-reseau" className="handle-left" />
                    <Handle type="target" position={Position.Bottom} id="ats-in-onduleur" className="handle-bottom" />
                    
                    <div className="node-banner" style={{borderBottom:'2px solid var(--color-ats)', padding:'7px 8px'}}>
                        <div style={{display:'flex', alignItems:'center', gap:5, fontWeight:600}}>
                            <div style={{width:18,height:18,background:'var(--icon-ats)',borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:11}}>🔀</div>
                            <span>ATS</span>
                        </div>
                        
                        <div style={{display:'flex', alignItems:'center', gap:5, cursor: disabled ? 'default' : 'pointer'}} onClick={!disabled ? data.onToggleRemote : undefined}>
                            <span style={{fontSize:7.5}}>Télécom.</span>
                            <div className={`toggle-compact ${remoteOn?'on':''}`} style={{width:24,height:13}}></div>
                        </div>
                        
                        <span className={`banner-badge ${remoteOn?'badge-ok':'badge-warn'}`}>{remoteOn?"ON":"OFF"}</span>
                    </div>
                    
                    <div className="ats-sw">
                        <div className="sw-card"><span className="sw-label">SW1</span><span className={`sw-val ${(data.sw1||'').includes('Fermé')?'closed':'open'}`}>{data.sw1||'Ouvert'}</span></div>
                        <div className="sw-card"><span className="sw-label">SW2</span><span className={`sw-val ${(data.sw2||'').includes('Fermé')?'closed':'open'}`}>{data.sw2||'Ouvert'}</span></div>
                    </div>
                    
                    <div className="info-row-combined">
                        <div><span className="info-key">Mode</span><span className="info-val">{data.swMode||'---'}</span></div>
                        <div><span className="info-key">Défaut</span><span className={`info-val ${hasFault?'err':'ok'}`}>{hasFault?`⚠ ${fault}`:"✓ OK"}</span></div>
                    </div>
                    
                    <div className="info-row"><span className="info-key">Position</span><span className={`info-val ${centerOff?'err':''}`}>{data.middleOFF||'Normale'}</span></div>
                    
                    <div className="node-foot">
                        <button className="btn-force btn-danger" onClick={data.onForceOff} disabled={disabled}>
                            ⏹️ {disabled ? '...' : 'Centrale OFF'}
                        </button>
                    </div>
                </div>
            );
        };

        const nodeTypes = { reseau: ReseauNode, onduleur: OnduleurNode, ats: ATSNode };

        function App() {
            const [theme, setTheme] = useState(() => localStorage.getItem('ats-theme') || 'light');
            const [isProcessing, setIsProcessing] = useState(false);
            const [apiData, setApiData] = useState({ 
                v1a:'0',v2a:'0',sw1:'Ouvert',sw2:'Ouvert',s1a:'Normal',s2a:'Normal',
                swRemote:'Désactivé',swMode:'Auto',swFault:'Aucun',middleOFF:'Désactivé',
                cnt1:'0',cnt2:'0',t1:'0',t2:'0',max1:'400',max2:'400'
            });

            useEffect(() => { 
                document.documentElement.setAttribute('data-theme', theme); 
                localStorage.setItem('ats-theme', theme); 
            }, [theme]);

            const toggleTheme = () => setTheme(t => t==='light'?'dark':'light');

            const fetchData = useCallback(async () => {
                try { 
                    const r = await fetch('/api/read_all', { cache: 'no-cache' }); 
                    const j = await r.json(); 
                    if(j.success && j.values) setApiData(p=>({...p,...j.values})); 
                } catch(e) { console.error("Fetch err",e); }
            }, []);

            const executeCommand = async (steps) => {
                if (isProcessing) return;
                setIsProcessing(true);
                try {
                    for (const step of steps) {
                        if (typeof step === 'string') await fetch('/api/' + step, { method: 'POST', cache: 'no-cache' });
                        else if (typeof step === 'number') await new Promise(r => setTimeout(r, step));
                    }
                    await new Promise(r => setTimeout(r, 600));
                    await fetchData();
                } catch (e) { console.error("Command failed:", e); }
                finally { setIsProcessing(false); }
            };

            const handleForceSource = (id) => executeCommand(['remote_on', 200, (id===1?'force_source1':'force_source2'), 'remote_off']);
            const handleToggleRemote = () => {
                const isOn = apiData.swRemote === "📡 Activé" || apiData.swRemote === "Activé";
                executeCommand([isOn ? 'remote_off' : 'remote_on', 300]);
            };
            const handleForceOff = () => {
                if(confirm("⚠️ Confirmer l'arrêt complet (Double OFF) ?")) {
                    executeCommand(['remote_on', 200, 'force_double', 'remote_off']);
                }
            };

            const baseNodes = useMemo(() => [
                {id:'reseau', type:'reseau', position:{x:-280, y:70}, draggable:false},
                {id:'ats', type:'ats', position:{x:0, y:65}, draggable:false},
                {id:'onduleur', type:'onduleur', position:{x:0, y:255}, draggable:false}
            ], []);

            useEffect(() => { fetchData(); const id = setInterval(fetchData, 5000); return () => clearInterval(id); }, [fetchData]);

            const nodesWithData = useMemo(() => baseNodes.map(n => ({
                ...n,
                data: { 
                    ...apiData, 
                    disabled: isProcessing,
                    onForce: n.id === 'reseau' ? () => handleForceSource(2) : 
                             n.id === 'onduleur' ? () => handleForceSource(1) : undefined,
                    onToggleRemote: n.id === 'ats' ? handleToggleRemote : undefined,
                    onForceOff: n.id === 'ats' ? handleForceOff : undefined
                }
            })), [apiData, isProcessing]);

            const sw1C = apiData.sw1?.includes("Fermé");
            const sw2C = apiData.sw2?.includes("Fermé");
            const midOff = apiData.middleOFF?.includes("Activé");

            const edges = useMemo(() => {
                if (midOff) return [];
                const e = [];
                if (sw1C && !sw2C) {
                    e.push({id:'e1', source:'onduleur', target:'ats', sourceHandle:'onduleur-out', targetHandle:'ats-in-onduleur', animated:true, style:{stroke:'var(--edge-active)', strokeWidth:2.5}, markerEnd:{type:MarkerType.ArrowClosed, color:'var(--edge-active)'}, type:'smoothstep'});
                } else if (sw2C && !sw1C) {
                    e.push({id:'e2', source:'reseau', target:'ats', sourceHandle:'reseau-out', targetHandle:'ats-in-reseau', animated:true, style:{stroke:'var(--edge-active)', strokeWidth:2.5}, markerEnd:{type:MarkerType.ArrowClosed, color:'var(--edge-active)'}, type:'smoothstep'});
                } else if (sw1C && sw2C) {
                    e.push(
                        {id:'e1', source:'onduleur', target:'ats', sourceHandle:'onduleur-out', targetHandle:'ats-in-onduleur', animated:true, style:{stroke:'var(--edge-active)', strokeWidth:2.5}, markerEnd:{type:MarkerType.ArrowClosed, color:'var(--edge-active)'}, type:'smoothstep'},
                        {id:'e2', source:'reseau', target:'ats', sourceHandle:'reseau-out', targetHandle:'ats-in-reseau', animated:true, style:{stroke:'var(--edge-ats)', strokeWidth:2.5}, markerEnd:{type:MarkerType.ArrowClosed, color:'var(--edge-ats)'}, type:'smoothstep'}
                    );
                }
                return e;
            }, [sw1C, sw2C, midOff]);

            return (
                <ReactFlow 
                    nodes={nodesWithData} 
                    edges={edges} 
                    nodeTypes={nodeTypes} 
                    fitView 
                    fitViewOptions={{padding: 0.25}}
                    defaultViewport={{x:30, y:20, zoom:1.05}}
                    nodesConnectable={false} 
                    nodesDraggable={false} 
                    panOnDrag 
                    zoomOnScroll 
                    minZoom={0.5} 
                    maxZoom={2.2}
                    edgesConnectable={false}
                >
                    <Background color="var(--border-color)" gap={16} size={1}/>
                    <Controls showInteractive={false} />
                    
                    <div className="top-bar">
                        <a href="index.html" style={{textDecoration:'none', color:'var(--color-primary)'}}>← Retour</a>
                        <span style={{color:'var(--text-muted)'}}>ATS • Mise à jour toutes les 5s</span>
                        <button onClick={toggleTheme} style={{background:'transparent', border:'none', color:'var(--text-secondary)', cursor:'pointer', fontSize:'11px'}}>
                            {theme==='light' ? '🌙' : '☀️'}
                        </button>
                    </div>
                </ReactFlow>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
