{% extends "base.html" %}
{% block title %}Visualisation ESS{% endblock %}
{% block page_title %}⚡ Visualisation Système{% endblock %}
{% block nav_viz %}active{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/reactflow@11/dist/style.css">
<style>
{% include "visualization.css" %}
</style>
{% endblock %}

{% block content %}
<div id="ess-flow-root" style="width:100%;height:calc(100vh - 56px)"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/reactflow@11/dist/umd/index.js" crossorigin></script>
<script>
'use strict';

const h = React.createElement;
const { useState, useEffect, useCallback, useRef, memo } = React;
const { ReactFlow, Background, Controls, Panel, Handle, Position, useNodesState, useEdgesState } = window.ReactFlow;

const fmtKw  = w  => w  != null ? `${(w / 1000).toFixed(2)} kW` : '—';
const socColor = s => s > 60 ? '#16a34a' : s > 30 ? '#ca8a04' : '#dc2626';

function mkHandle(type, pos, id, style) {
  return h(Handle, { type, position: pos, id, style: { background: '#94a3b8', width: 8, height: 8, ...style } });
}

function SummaryNode({ data }) {
  return h('div', { className: 'sn' },
    mkHandle('target', Position.Top,    'tt'),
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('target', Position.Left,   'tl'),
    mkHandle('source', Position.Right,  'sr'),
    mkHandle('target', Position.Right,  'tr', { top: '68%' }),
    mkHandle('source', Position.Left,   'sl', { top: '68%' }),
    h('div', { className: 'sn-icon' }, data.icon),
    h('div', { className: 'sn-body' },
      h('div', { className: 'sn-label' }, data.label),
      h('div', { className: 'sn-value' }, data.value ?? '—'),
      h('div', { className: 'sn-sub'   }, data.sub   ?? '\u00a0')
    ),
    h('div', { className: `sn-dot ${data.dotClass ?? ''}` })
  );
}

function BmsNode({ data }) {
  const live  = data.live;
  const soc   = live?.Soc   ?? null;
  const cur   = live?.Dc?.Current ?? null;
  const pwr   = live?.Dc?.Power   ?? null;
  const volt  = live?.Dc?.Voltage ?? null;
  const tmax  = live?.System?.MaxCellTemperature ?? null;
  const alarm = live?.Alarms ? Object.values(live.Alarms).some(v => v > 0) : false;

  return h('div', { className: `bms-nd${alarm ? ' alarm' : ''}` },
    mkHandle('target', Position.Top, 'tt'),
    h('div', { className: 'bms-hdr' },
      h('span', null, '🔋'),
      h('span', { className: 'bms-name' }, data.label),
      tmax != null ? h('span', { className: 'bms-temp' }, `🌡 ${tmax.toFixed(1)}°C`) : null,
      h('div',  { className: `bms-live-dot${live ? ' on' : ''}` })
    ),
    h('div', { className: 'bms-bar-bg' },
      h('div', {
        className: 'bms-bar-fill',
        style: { width: `${soc ?? 0}%`, background: soc != null ? socColor(soc) : '#e2e8f0' }
      })
    ),
    h('div', { className: 'bms-kpis' },
      h('div', { className: 'bms-kpi' },
        h('div', { className: 'bms-kpi-v' }, soc != null ? `${soc.toFixed(0)}%` : '—'),
        h('div', { className: 'bms-kpi-l' }, 'SOC')
      ),
      h('div', { className: 'bms-kpi' },
        h('div', { className: 'bms-kpi-v' }, volt != null ? `${volt.toFixed(2)}V` : '—'),
        h('div', { className: 'bms-kpi-l' }, 'Tension')
      ),
      h('div', { className: 'bms-kpi' },
        h('div', {
          className: 'bms-kpi-v',
          style: { color: cur != null ? (cur < 0 ? '#dc2626' : cur > 0 ? '#2563eb' : '#0f172a') : undefined }
        }, cur != null ? `${cur > 0 ? '+' : ''}${cur.toFixed(1)}A` : '—'),
        h('div', { className: 'bms-kpi-l' }, 'Courant')
      ),
      h('div', { className: 'bms-kpi' },
        h('div', { className: 'bms-kpi-v' }, pwr != null ? `${pwr > 0 ? '+' : ''}${(pwr / 1000).toFixed(0)}` : '—'),
        h('div', { className: 'bms-kpi-l' }, 'kW')
      )
    )
  );
}
  
function Et112CardNode({ data }) {
  const live = data.live;
  const connected = live?.connected ?? false;
  const pwr  = live?.power_w ?? null;
  const volt = live?.voltage_v ?? null;
  const cur  = live?.current_a ?? null;
  const imp  = live?.energy_import_wh != null ? live.energy_import_wh / 1000 : null;
  const expW = live?.energy_export_wh != null ? live.energy_export_wh / 1000 : null;
  const addr = data.address ?? 7;
  const icon = data.icon || '☀';

  return h('div', { className: 'et112-card-wrapper' },
    mkHandle('target', Position.Left,   'tl'),
    mkHandle('source', Position.Left,   'sl', { top: '50%' }),
    mkHandle('target', Position.Top,    'tt'),
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('source', Position.Right,  'sr'),
    mkHandle('target', Position.Right,  'tr', { top: '50%' }),
    h('div', { className: `bms-card-in-viz ${connected ? '' : 'offline-card'}`, style: { opacity: connected ? 1 : 0.7 } },
      h('div', { className: `bms-hdr ${connected ? '' : 'offline'}` },
        h('div', { className: 'bms-hdr-left' },
          connected ? h('div', { className: 'bms-live' }, h('div', { className: 'live-dot' }), 'LIVE') : h('span', { style: { fontSize: '0.62rem', color: 'var(--muted2)' } }, 'Hors ligne'),
          h('span', { className: 'bms-hdr-name' }, `${icon} `, data.label)
        ),
        h('div', { className: 'bms-hdr-right' }, h('span', { className: 'bms-badge' }, `0x0${addr.toString(16).toUpperCase()}`))
      ),
      connected && live ? h('div', { className: 'kpi4' },
        h('div', { className: 'kpi4-cell t-yellow' },
          h('div', { className: 'kpi4-lbl' }, 'Puissance'),
          h('div', { className: `kpi4-val ${(pwr ?? 0) >= 0 ? 'chg' : 'dch'}` }, pwr != null ? `${pwr.toFixed(0)} W` : '—')
        ),
        h('div', { className: 'kpi4-cell t-blue' },
          h('div', { className: 'kpi4-lbl' }, 'Tension'),
          h('div', { className: 'kpi4-val' }, volt != null ? `${volt.toFixed(1)} V` : '—')
        ),
        h('div', { className: 'kpi4-cell t-orange' },
          h('div', { className: 'kpi4-lbl' }, 'Courant'),
          h('div', { className: 'kpi4-val' }, cur != null ? `${cur.toFixed(2)} A` : '—')
        )
      ) : h('div', { className: 'empty-state' },
        h('div', { className: 'empty-icon' }, '⏳'),
        h('div', { className: 'empty-title' }, 'En attente de données')
      ),
      connected && live ? h('div', { className: 'istrip' },
        h('div', { className: 'icell' },
          h('span', { className: 'i-lbl' }, '⬇ Importée'),
          h('span', { className: 'i-val ok' }, imp != null ? `${imp.toFixed(2)} kWh` : '—')
        ),
        h('div', { className: 'icell' },
          h('span', { className: 'i-lbl' }, '⬆ Exportée'),
          h('span', { className: 'i-val blue' }, expW != null ? `${expW.toFixed(2)} kWh` : '—')
        )
      ) : null
      
    )
  );
}

function DeviceNode({ data }) {
  const live = data.live;
  const pwr  = live?.power_w;
  const nrj  = live?.energy_import_kwh;
  return h('div', { className: 'dev-nd' },
    mkHandle('target', Position.Top,    'tt'),
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('target', Position.Left,   'tl'),
    mkHandle('source', Position.Right,  'sr'),
    mkHandle('source', Position.Left,   'sl', { top: '65%' }),
    mkHandle('target', Position.Right,  'tr', { top: '65%' }),
    h('div', { className: 'dev-hdr' },
      h('span', null, data.icon ?? '⚡'),
      h('span', { className: 'dev-lbl' }, data.label),
      h('div',  { className: `dev-dot${live?.connected ? ' on' : ''}` })
    ),
    live ? h('div', null,
      h('div', { className: 'dev-pwr' }, pwr != null ? `${(pwr / 1000).toFixed(2)} kW` : '—'),
      h('div', { className: 'dev-nrj' }, nrj != null ? `${nrj.toFixed(1)} kWh total` : '\u00a0')
    ) : h('div', { className: 'dev-wait' }, 'En attente…')
  );
}

function HubNode({ data }) {
  return h('div', { className: 'hub-nd' },
    mkHandle('target', Position.Top,    'tt'),
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('target', Position.Left,   'tl'),
    mkHandle('source', Position.Right,  'sr'),
    mkHandle('target', Position.Right,  'tr', { top: '68%' }),
    mkHandle('source', Position.Left,   'sl', { top: '68%' }),
    h('div', { className: 'hub-icon' }, data.icon),
    h('div', { className: 'hub-lbl'  }, data.label),
    data.sub && h('div', { className: 'hub-sub' }, data.sub)
  );
}

function PlaceholderNode({ data }) {
  return h('div', { className: 'ph-nd' },
    mkHandle('target', Position.Top,    'tt'),
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('target', Position.Left,   'tl'),
    mkHandle('source', Position.Right,  'sr'),
    mkHandle('target', Position.Right,  'tr', { top: '68%' }),
    mkHandle('source', Position.Left,   'sl', { top: '68%' }),
    data.icon && h('span', { className: 'ph-icon' }, data.icon),
    h('div', { className: 'ph-lbl'   }, data.label),
    h('div', { className: 'ph-badge' }, 'À venir')
  );
}

function MPPTGroupNode({ data }) {
  const mppts       = data.mppts       ?? [];
  const totalPowerW = data.totalPowerW ?? 0;
  const totalDcA    = data.totalDcA    ?? 0;

  const stateClass = (s) => {
    if (!s) return '';
    const l = s.toLowerCase();
    if (l === 'off')   return 'off';
    if (l === 'fault') return 'fault';
    return '';
  };

  return h('div', { className: 'mppt-group-card' },
    mkHandle('target', Position.Top,    'tt'),
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('target', Position.Left,   'tl'),
    mkHandle('source', Position.Right,  'sr'),
    mkHandle('target', Position.Right,  'tr', { top: '65%' }),
    mkHandle('source', Position.Left,   'sl', { top: '65%' }),
    h('div', { className: 'mg-header' },
      h('span', { className: 'mg-header-icon' }, '☀️'),
      h('span', { className: 'mg-header-title' }, 'MPPT Solaire'),
      h('span', { style: { fontSize:'0.65rem', opacity:0.8, marginLeft:'auto' } }, `${mppts.length} chargeur${mppts.length > 1 ? 's' : ''}`)
    ),
    h('div', { className: 'mg-totals' },
      h('div', { className: 'mg-total-chip' },
        h('span', { className: 'mg-total-lbl' }, 'Total Puissance'),
        h('span', { className: 'mg-total-val' }, `${Math.round(totalPowerW)} W`)
      ),
      h('div', { className: 'mg-total-chip' },
        h('span', { className: 'mg-total-lbl' }, 'Total DC'),
        h('span', { className: 'mg-total-val' }, `${Math.round(totalDcA)} A`)
      )
    ),
    mppts.length > 0 ? h('div', { className: 'mg-mppt-list' },
      mppts.map((m, i) => {
        const inst  = m.instance ?? i;
        const name  = inst > 0 ? `MPPT-${inst}` : `MPPT-${i+1}`;
        const s     = m.state ?? null;
        const pvV   = m.pv_voltage_v ?? null;
        const dcA   = m.dc_current_a ?? null;
        const pw    = m.power_w ?? null;
        return h('div', { key: inst, className: 'mg-mppt-row' },
          h('span', { className: 'mg-mppt-name' }, name),
          h('span', { className: `mg-mppt-state ${stateClass(s)}` }, s ?? '—'),
          h('div', { className: 'mg-mppt-metrics' },
            h('div', { className: 'mg-metric' },
              h('span', { className: 'mg-metric-lbl' }, 'PV'),
              h('span', { className: 'mg-metric-val' }, pvV != null ? `${pvV.toFixed(1)}V` : '—')
            ),
            h('div', { className: 'mg-metric' },
              h('span', { className: 'mg-metric-lbl' }, 'DC'),
              h('span', { className: 'mg-metric-val' }, dcA != null ? `${dcA.toFixed(1)}A` : '—')
            ),
            h('div', { className: 'mg-metric' },
              h('span', { className: 'mg-metric-lbl' }, 'W'),
              h('span', { className: 'mg-metric-val' }, pw != null ? `${Math.round(pw)}` : '—')
            )
          )
        );
      })
    ) : h('div', { className: 'mg-wait' }, 'En attente des chargeurs…')
  );
}

function SmartShuntNode({ data }) {
  const live    = data.live;
  const soc     = live?.soc_percent   ?? null;
  const voltage = live?.voltage_v     ?? null;
  const current = live?.current_a     ?? null;
  const power   = live?.power_w       ?? null;
  const eIn     = live?.energy_in_kwh ?? null;
  const eOut    = live?.energy_out_kwh ?? null;
  const state   = live?.state         ?? null;
  const ttgMin  = live?.time_to_go_min ?? null;

  const stateClass = state === 'Charging' ? 'charging' : state === 'Discharging' ? 'discharging' : 'idle';

  const fmtTtg = (min) => {
    if (min == null) return '—';
    if (min >= 1440) return `${(min/1440).toFixed(0)}j`;
    if (min >= 60)   return `${Math.floor(min/60)}h${Math.round(min%60).toString().padStart(2,'0')}`;
    return `${Math.round(min)} min`;
  };

  return h('div', { className: 'ss-card' },
    mkHandle('target', Position.Top,    'tt'),
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('target', Position.Left,   'tl'),
    mkHandle('source', Position.Right,  'sr'),
    mkHandle('target', Position.Right,  'tr', { top: '65%' }),
    mkHandle('source', Position.Left,   'sl', { top: '65%' }),
    h('div', { className: 'ss-hdr' },
      h('span', { className: 'ss-hdr-icon' }, '⚡'),
      h('span', { className: 'ss-hdr-title' }, 'SmartShunt'),
      state && h('span', { className: `ss-state-badge ${stateClass}` }, state),
      h('div', { className: `ss-dot${live ? ' live' : ''}` })
    ),
    h('div', { className: 'ss-bar-bg' },
      h('div', { className: 'ss-bar-fill', style: { width: `${soc ?? 0}%`, background: soc != null ? socColor(soc) : '#e2e8f0' } })
    ),
    live ? h('div', null,
      h('div', { className: 'ss-grid' },
        h('div', { className: 'ss-cell' },
          h('span', { className: 'ss-cell-lbl' }, 'SOC'),
          h('span', { className: 'ss-cell-val', style: { color: soc != null ? socColor(soc) : undefined } }, soc != null ? `${soc.toFixed(1)}%` : '—')
        ),
        h('div', { className: 'ss-cell' },
          h('span', { className: 'ss-cell-lbl' }, 'Tension'),
          h('span', { className: 'ss-cell-val' }, voltage != null ? `${voltage.toFixed(1)}V` : '—')
        ),
        h('div', { className: 'ss-cell' },
          h('span', { className: 'ss-cell-lbl' }, 'Courant'),
          h('span', { className: `ss-cell-val ${current != null ? (current < 0 ? 'neg' : current > 0.1 ? 'pos' : '') : ''}` },
            current != null ? `${current > 0 ? '+' : ''}${current.toFixed(1)}A` : '—')
        )
      ),

      h('div', { className: 'ss-row' },
        h('span', { className: 'ss-row-lbl' }, 'Puissance'),
        h('span', { className: 'ss-row-val' }, power != null ? `${power > 0 ? '+' : ''}${power.toFixed(0)} W` : '—')
      ),
        h('div', { style: { display: 'flex', gap: '1rem', flexWrap: 'wrap' } },
        h('div', { className: 'ss-row', style: { flex: '1 1 0', minWidth: 0 } },
          h('span', { className: 'ss-row-lbl' }, 'Temps restant'),
          h('span', { className: 'ss-row-val ttg' }, fmtTtg(ttgMin))
        ),
        h('div', { className: 'ss-row', style: { flex: '1 1 0', minWidth: 0 } },
          h('span', { className: 'ss-row-lbl' }, '⬆ Chargée'),
          h('span', { className: 'ss-row-val' }, eIn != null ? `${eIn.toFixed(1)} kWh` : '—')
        ),
        h('div', { className: 'ss-row', style: { flex: '1 1 0', minWidth: 0 } },
          h('span', { className: 'ss-row-lbl' }, '⬇ Déchargée'),
          h('span', { className: 'ss-row-val' }, eOut != null ? `${eOut.toFixed(1)} kWh` : '—')
        )
    )       
    ) : h('div', { className: 'ss-wait' }, 'En attente…')
  );
}

function TemperatureNode({ data }) {
  const live = data.live;
  const temp = live?.temp_c ?? null;
  const humidity = live?.humidity_percent ?? null;

  return h('div', { className: 'dev-nd' },
    mkHandle('target', Position.Top,    'tt'),
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('target', Position.Left,   'tl'),
    mkHandle('source', Position.Right,  'sr'),
    mkHandle('target', Position.Right,  'tr', { top: '65%' }),
    mkHandle('source', Position.Left,   'sl', { top: '65%' }),
    h('div', { className: 'dev-hdr' },
      h('span', null, data.icon ?? '🌡️'),
      h('span', { className: 'dev-lbl' }, data.label),
      h('div', { className: `dev-dot${live ? ' on' : ''}` })
    ),
    live ? h('div', null,
      h('div', { className: 'dev-pwr' }, temp != null ? `${temp.toFixed(1)}°C` : '—'),
      h('div', { className: 'dev-nrj' }, humidity != null ? `${humidity.toFixed(0)}% HR` : '—')
    ) : h('div', { className: 'dev-wait' }, 'En attente…')
  );
}

// ── 🆕 NOUVEAU NODE TONGOU GROUP (4 à 6 switchs) ───────────────────────────
// 🔥 Correction : utilisation des IDs numériques 1,2,3,4
const TASMOTA_IDS = [1, 2, 3, 4];  // extensible jusqu'à 6

const TongouGroupNode = memo(function TongouGroupNode({ data }) {
  // Placeholders si data.switches est vide
  const switches = (data.switches && data.switches.length > 0) 
    ? data.switches 
    : TASMOTA_IDS.map(id => ({ id: id, name: `Switch ${id}`, connected: false }));
  
  const disabled = data.disabled || false;

  const handleToggle = useCallback((switchId, currentState) => {
    if (disabled) return;
    const newState = !currentState;
    const cmd = newState ? 'on' : 'off';
    console.log(`[TONGOU] Toggle ID ${switchId} -> ${cmd}`);
    fetch(`/api/v1/tasmota/${switchId}/control`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ state: cmd }),
      cache: 'no-cache'
    })
    .then(r => r.json())
    .then(d => console.log(`[TONGOU] OK ID ${switchId}:`, d))
    .catch(err => console.error(`[TONGOU] Erreur ID ${switchId}:`, err));
  }, [disabled]);

  const countOnline = switches.filter(s => s.connected).length;

  return h('div', { className: 'tongou-group-card' },
    mkHandle('target', Position.Top,    'tt'),
    mkHandle('source', Position.Bottom, 'sb'),
    mkHandle('target', Position.Left,   'tl'),
    mkHandle('source', Position.Right,  'sr'),
    mkHandle('target', Position.Right,  'tr', { top: '68%' }),
    mkHandle('source', Position.Left,   'sl', { top: '68%' }),
    h('div', { className: 'tg-header' },
      h('span', { className: 'tg-header-icon' }, '🔌'),
      h('span', { className: 'tg-header-title' }, 'Meter Switchs'),
      h('span', { className: 'tg-header-count' }, `${countOnline}/${switches.length} en ligne`)
    ),
    h('div', { className: 'tg-switch-list' },
      switches.map((sw, idx) => {
        const switchId = sw.id || idx+1;
        const connected = sw.connected ?? false;
        const powerOn = sw.power_on ?? false;
        const powerW = sw.power_w ?? null;
        const voltage = sw.voltage_v ?? null;
        const current = sw.current_a ?? null;
        const energy = sw.energy_today_kwh ?? null;
        const name = sw.name || `Switch ${switchId}`;
        const displayId = `ID: ${switchId}`;

        return h('div', { key: switchId, className: 'tg-switch-item' },
          // Ligne 1 : nom, ID, bouton toggle
          h('div', { className: 'tg-row1' },
            h('span', { className: 'tg-name' }, name),
            h('span', { className: 'tg-id' }, displayId),
            h('button', {
              className: `tg-toggle-btn ${powerOn ? 'off' : ''}`,
              'data-is-interactive': 'true',
              disabled: disabled || !connected,
              onClick: (e) => { e.stopPropagation(); handleToggle(switchId, powerOn); }
            }, disabled ? '...' : (connected ? (powerOn ? 'Éteindre' : 'Allumer') : 'Hors ligne'))
          ),
          // Ligne 2 : mesures avec fond coloré selon état
          h('div', { className: `tg-row2 ${connected ? (powerOn ? 'on' : 'off') : ''}` },
            h('div', { className: 'tg-metric' },
              h('span', { className: 'tg-metric-label' }, 'Puissance'),
              h('span', { className: 'tg-metric-value' }, powerW != null ? `${powerW.toFixed(0)} W` : '—')
            ),
            h('div', { className: 'tg-metric' },
              h('span', { className: 'tg-metric-label' }, 'Tension'),
              h('span', { className: 'tg-metric-value' }, voltage != null ? `${voltage.toFixed(1)} V` : '—')
            ),
            h('div', { className: 'tg-metric' },
              h('span', { className: 'tg-metric-label' }, 'Courant'),
              h('span', { className: 'tg-metric-value' }, current != null ? `${current.toFixed(2)} A` : '—')
            ),
            h('div', { className: 'tg-metric' },
              h('span', { className: 'tg-metric-label' }, 'Aujourd\'hui'),
              h('span', { className: 'tg-metric-value small' }, energy != null ? `${energy.toFixed(2)} kWh` : '—')
            )
          )
        );
      })
    )
  );
});

// ── ✅ ATS Nodes ─────────────────────────────────────────────
function AtsReseauNode({ data }) {
  const active = (data.sw2 || '').includes('Fermé');
  const connected = (parseInt(data.v2a) || 0) > 50;
  const status = (data.s2a || '').toLowerCase();
  const isOk = status.includes('normal');
  const vLevel = Math.min(100, Math.max(0, ((parseInt(data.v2a) || 0) / 400) * 100));
  
  const handleClick = useCallback((e) => {
    e.stopPropagation();
    e.preventDefault();
    console.log('[ATS-RESEAU] Bouton cliqué, onForce:', typeof data.onForce);
    if (typeof data.onForce === 'function' && !data.disabled) {
      console.log('[ATS-RESEAU] Exécution onForce()');
      data.onForce();
    }
  }, [data.onForce, data.disabled]);

function ESSFlow() {
  const [nodes, setNodes, onNodesChange] = useNodesState(NODES0);
  const [edges, setEdges, onEdgesChange] = useEdgesState(EDGES0);
  const [lastUpdate, setLastUpdate] = useState('—');
  const [atsProcessing, setAtsProcessing] = useState(false);
  const [atsRev, setAtsRev] = useState(0);
  const atsExecRef = useRef(null);
  const atsBusyRef = useRef(false);
  
  atsExecRef.current = async function(steps) {
    if (atsBusyRef.current) return;
    atsBusyRef.current = true;
    setAtsProcessing(true);
    try {
      for (const step of steps) {
        if (typeof step === 'string') await fetch('/api/v1/ats/' + step, { method: 'POST', cache: 'no-cache' });
        else if (typeof step === 'number') await new Promise(r => setTimeout(r, step));
      }
    } finally { 
      atsBusyRef.current = false; 
      setAtsProcessing(false); 
    }
  };

  const handleAtsReseauForce = useCallback(() => {
    console.log('[CALLBACK] Force Réseau appelé');
    atsExecRef.current?.(['remote_on', 200, 'force_source2', 200, 'remote_off']);
  }, []);
  
  const handleAtsOnduleurForce = useCallback(() => {
    console.log('[CALLBACK] Force Onduleur appelé');
    atsExecRef.current?.(['remote_on', 200, 'force_source1', 200, 'remote_off']);
  }, []);
  
  const handleAtsToggleRemote = useCallback(() => {
    console.log('[CALLBACK] Toggle Remote appelé');
    atsExecRef.current?.(['remote_on', 300]);
  }, []);
  
  const handleAtsForceOff = useCallback(() => {
    console.log('[CALLBACK] Force Off appelé');
    if (window.confirm('⚠️ Confirmer Double OFF ?')) {
      atsExecRef.current?.(['remote_on', 200, 'force_double', 200, 'remote_off']);
    }
  }, []);

  const applyData = useCallback(function(d) {
    const bms1 = d.bms1, bms2 = d.bms2;
    const et7  = d.et7,  et8  = d.et8, et9 = d.et9;
    const irr  = d.irr;
    const mpptList       = d.mpptList       ?? [];
    const mpptTotalPowerW = d.mpptTotalPowerW ?? 0;
    const mpptTotalDcA   = d.mpptTotalDcA   ?? 0;
    const shunt = d.shunt;
    const inverter = d.inverter;
    const temp = d.temp;
    const ats = d.ats;
    const tasmotaDevices = d.tasmotaDevices || [];

    const validBms = [bms1, bms2].filter(Boolean);
    const avgSoc   = validBms.length
      ? (validBms.reduce((s, b) => s + (b.Soc ?? 0), 0) / validBms.length).toFixed(0)
      : null;
    const totalPwr = validBms.reduce((s, b) => s + (b.Dc?.Power ?? 0), 0);
    const batVal   = avgSoc != null ? `SOC ${avgSoc}%` : '—';
    const batSub   = totalPwr ? `${totalPwr > 0 ? '+' : ''}${(totalPwr / 1000).toFixed(2)} kW` : '360 Ah + 320 Ah';
    const batDot   = avgSoc == null ? '' : avgSoc > 50 ? 'live' : avgSoc > 20 ? 'warn' : 'alarm';

    const microPwr = et7?.power_w ?? 0;
    const mpptPwr  = mpptTotalPowerW;
    const totalProdPwr = microPwr + mpptPwr;
    const prodVal  = fmtKw(totalProdPwr);
    const prodDot  = (et7?.connected || mpptList.length > 0) ? (totalProdPwr > 50 ? 'live' : '') : '';

    const irrVal  = irr?.irradiance_wm2 != null ? `${irr.irradiance_wm2.toFixed(0)} W/m²` : '—';
    const irrSub  = irr?.total_yield_kwh != null ? `☀ ${irr.total_yield_kwh.toFixed(1)} kWh` : 'Irradiance solaire';
    const irrDot  = irr ? 'live' : '';

    if (ats) {
      const sw1C = (ats.sw1 || '').includes('Fermé');
      const sw2C = (ats.sw2 || '').includes('Fermé');
      const midOff = (ats.middleOFF || '').includes('Activé');

      const atsEdges = [];
      if (!midOff) {
        if (sw2C) atsEdges.push({
          id: 'ats-e2', source: 'ats-reseau', target: 'ats-main',
          sourceHandle: 'reseau-out', targetHandle: 'ats-in-reseau',
          animated: true, type: 'smoothstep',
          style: { stroke: sw1C ? '#6366f1' : '#10b981', strokeWidth: 2, strokeDasharray: '4 4' }
        });
        if (sw1C) atsEdges.push({
          id: 'ats-e1', source: 'ats-onduleur', target: 'ats-main',
          sourceHandle: 'onduleur-out', targetHandle: 'ats-in-onduleur',
          animated: true, type: 'smoothstep',
          style: { stroke: '#10b981', strokeWidth: 2, strokeDasharray: '4 4' }
        });
      }

      setEdges(prev => [...prev.filter(e => !e.id.startsWith('ats-e')), ...atsEdges]);
    }

    const newRev = atsRev + 1;
    setAtsRev(newRev);

    setNodes(prev => prev.map(n => {
      switch (n.id) {
        case 'batteries':
          return { ...n, data: { ...n.data, value: batVal, sub: batSub, dotClass: batDot } };
        case 'production':
          const mpptYieldSum = mpptList.reduce((s, m) => s + (m.yield_today_kwh ?? 0), 0);
          const prodSub = et7 ? `${((et7.energy_export_wh ?? 0) / 1000).toFixed(1)} kWh ET112` : mpptList.length > 0 ? `${mpptYieldSum.toFixed(2)} kWh MPPT` : 'Micro-onduleurs';
          return { ...n, data: { ...n.data, value: prodVal, sub: prodSub, dotClass: prodDot } };
        case 'meteo':
          return { ...n, data: { ...n.data, value: irrVal, sub: irrSub, dotClass: irrDot } };
        case 'bms1': return { ...n, data: { ...n.data, live: bms1 ?? null } };
        case 'bms2': return { ...n, data: { ...n.data, live: bms2 ?? null } };
        case 'micro-ond':   return { ...n, data: { ...n.data, live: et7  ?? null } };
        case 'et112-reseau': return { ...n, data: { ...n.data, live: et9 ?? null } };
        case 'et112-maison': return { ...n, data: { ...n.data, live: et8 ?? null } };
        case 'onduleur':    return { ...n, data: { ...n.data, live: inverter ?? null } };
        case 'chauffe-eau': return { ...n, data: { ...n.data, live: et8  ?? null } };
        case 'climatisation': return { ...n, data: { ...n.data, live: et9 ?? null } };
        case 'mppt':        return { ...n, data: { ...n.data, mppts: mpptList, totalPowerW: mpptTotalPowerW, totalDcA: mpptTotalDcA } };
        case 'smartshunt':  return { ...n, data: { ...n.data, live: shunt ?? null } };
        case 'temp-ext':    return { ...n, data: { ...n.data, live: temp ?? null } };
        case 'tongou-group': return { ...n, data: { ...n.data, switches: tasmotaDevices, disabled: atsProcessing, _rev: newRev } };
        
        case 'ats-reseau':
          if (!ats) return n;
          return { 
            ...n, 
            data: { 
              ...ats, 
              disabled: atsProcessing, 
              onForce: handleAtsReseauForce,
              _rev: newRev
            } 
          };
        case 'ats-onduleur':
          if (!ats) return n;
          return { 
            ...n, 
            data: { 
              ...ats, 
              disabled: atsProcessing, 
              onForce: handleAtsOnduleurForce,
              _rev: newRev 
            } 
          };
        case 'ats-main':
          if (!ats) return n;
          return { 
            ...n, 
            data: { 
              ...ats, 
              disabled: atsProcessing, 
              onToggleRemote: handleAtsToggleRemote,
              onForceOff: handleAtsForceOff,
              _rev: newRev 
            } 
          };
        default: return n;
      }
    }));

    setLastUpdate(new Date().toLocaleTimeString('fr-FR'));
  }, [atsProcessing, atsRev, handleAtsReseauForce, handleAtsOnduleurForce, handleAtsToggleRemote, handleAtsForceOff]);

  useEffect(function() {
    const safe = p => p.catch(() => null);
    async function fetchAll() {
      const [bms1, bms2, et7, et8, et9, irr, venusResp, tempResp, atsResp] = await Promise.all([
        safe(fetch('/api/v1/bms/1/status').then(r => r.ok ? r.json() : null)),
        safe(fetch('/api/v1/bms/2/status').then(r => r.ok ? r.json() : null)),
        safe(fetch('/api/v1/et112/7/status').then(r => r.ok ? r.json() : null)),
        safe(fetch('/api/v1/et112/8/status').then(r => r.ok ? r.json() : null)),
        safe(fetch('/api/v1/et112/9/status').then(r => r.ok ? r.json() : null)),
        safe(fetch('/api/v1/irradiance/status').then(r => r.ok ? r.json() : null)),
        safe(fetch('/api/v1/venus/mppt').then(r => r.ok ? r.json() : null)),
        safe(fetch('/api/v1/venus/temperatures').then(r => r.ok ? r.json() : null)),
        safe(fetch('/api/v1/ats/status').then(r => r.ok ? r.json() : null)),
      ]);

      // 🔥 Récupération des données Tasmota pour chaque ID numérique
      const tasmotaPromises = TASMOTA_IDS.map(async (id) => {
        try {
          const resp = await fetch(`/api/v1/tasmota/${id}/status`);
          if (!resp.ok) return null;
          const data = await resp.json();
          return {
            id: id,  // ID numérique
            name: data.name || `Switch ${id}`,
            connected: true,
            power_on: data.power_on ?? false,
            power_w: data.power_w ?? 0,
            voltage_v: data.voltage_v ?? 0,
            current_a: data.current_a ?? 0,
            energy_today_kwh: data.energy_today_kwh ?? 0
          };
        } catch {
          return { id: id, name: `Switch ${id}`, connected: false };
        }
      });
      const tasmotaDevices = (await Promise.all(tasmotaPromises)).filter(Boolean);

      const mpptList        = venusResp?.mppts         ?? [];
      const mpptTotalPowerW = venusResp?.total_power_w  ?? 0;
      const mpptTotalDcA    = venusResp?.total_dc_current_a ?? 0;
      const shuntResp = await safe(fetch('/api/v1/venus/smartshunt').then(r => r.ok ? r.json() : null));
      const shunt = shuntResp?.shunt ?? null;
      const inverterResp = await safe(fetch('/api/v1/venus/inverter').then(r => r.ok ? r.json() : null));
      const inverter = inverterResp?.inverter ?? null;
      const temps = tempResp?.temperatures ?? [];
      const temp = temps.length > 0 ? temps[0] : null;
      const ats = atsResp?.values ?? null;

      applyData({ bms1, bms2, et7, et8, et9, irr, mpptList, mpptTotalPowerW, mpptTotalDcA, shunt, inverter, temp, ats, tasmotaDevices });
    }
    fetchAll();
    const timer = setInterval(fetchAll, 2000);
    return function() { clearInterval(timer); };
  }, [applyData]);

  const legend = [
    { color: COLOR.ac,  label: 'Courant AC' },
    { color: COLOR.dc,  label: 'Bus DC' },
    { color: COLOR.bat, label: 'Batterie' },
  ];

  return h(ReactFlow, {
    nodes, edges, onNodesChange, onEdgesChange, nodeTypes, fitView: true,
    fitViewOptions: { padding: 0.06 }, minZoom: 0.2, maxZoom: 2.5,
    nodesDraggable: false, nodesConnectable: false, elementsSelectable: false, preventScrolling: false,
  },
    h(Background, { variant: 'dots', gap: 20, size: 1, color: '#c8d3de' }),
    h(Controls, { showInteractive: false }),
    h(Panel, { position: 'bottom-left' },
      h('div', { className: 'viz-panel viz-legend' },
        ...legend.map(l => h('div', { key: l.color, className: 'viz-leg-item' },
          h('div', { className: 'viz-leg-line', style: { background: l.color } }),
          l.label
        ))
      )
    ),
    h(Panel, { position: 'bottom-right' },
      h('div', { className: 'viz-panel' }, `Màj : ${lastUpdate}`)
    )
  );
}

ReactDOM.createRoot(document.getElementById('ess-flow-root')).render(h(ESSFlow));
</script>
{% endblock %}
