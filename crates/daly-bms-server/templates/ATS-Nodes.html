<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS - Supervision Compacte</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/reactflow@11.10.1/dist/umd/index.js"></script>
    <link href="https://unpkg.com/reactflow@11.10.1/dist/style.css" rel="stylesheet" />
    
    <style>
        :root {
            --bg-page: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --bg-card: #ffffff; --bg-card-subtle: #f8fafc; --bg-card-hover: #f1f5f9;
            --text-primary: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
            --border-color: #e2e8f0; --border-focus: #3b82f6;
            --color-primary: #2563eb; --color-primary-hover: #1d4ed8;
            --color-success: #10b981; --color-success-bg: rgba(16, 185, 129, 0.12);
            --color-warning: #f59e0b; --color-warning-bg: rgba(245, 158, 11, 0.12);
            --color-danger: #ef4444; --color-danger-bg: rgba(239, 68, 68, 0.12);
            --color-ats: #6366f1;
            --icon-reseau: linear-gradient(135deg, #0ea5e9, #38bdf8);
            --icon-onduleur: linear-gradient(135deg, #7c3aed, #a78bfa);
            --icon-ats: linear-gradient(135deg, #2563eb, #60a5fa);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.06);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.08);
            --radius-sm: 4px; --radius-md: 6px; --radius-lg: 10px;
            --edge-active: #10b981; --edge-ats: #6366f1;
        }
        [data-theme="dark"] {
            --bg-page: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --bg-card: #1e293b; --bg-card-subtle: #334155; --bg-card-hover: #475569;
            --text-primary: #f1f5f9; --text-secondary: #cbd5e1; --text-muted: #64748b;
            --border-color: #334155; --border-focus: #60a5fa;
            --color-primary: #3b82f6; --color-primary-hover: #60a5fa;
            --color-success: #34d399; --color-success-bg: rgba(52, 211, 153, 0.15);
            --color-warning: #fbbf24; --color-warning-bg: rgba(251, 191, 36, 0.15);
            --color-danger: #f87171; --color-danger-bg: rgba(248, 113, 113, 0.15);
            --color-ats: #818cf8;
            --icon-reseau: linear-gradient(135deg, #38bdf8, #7dd3fc);
            --icon-onduleur: linear-gradient(135deg, #a78bfa, #c4b5fd);
            --icon-ats: linear-gradient(135deg, #60a5fa, #93c5fd);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4), 0 2px 4px -2px rgb(0 0 0 / 0.3);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5), 0 4px 6px -4px rgb(0 0 0 / 0.4);
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: var(--bg-page); color: var(--text-primary); }
        #root { width: 100vw; height: 100vh; }
        
        .pro-node {
            width: 230px; background: var(--bg-card); border-radius: var(--radius-lg);
            border: 1px solid var(--border-color); box-shadow: var(--shadow-md);
            display: flex; flex-direction: column; overflow: hidden;
            transition: box-shadow 0.2s, border-color 0.2s, transform 0.1s;
            font-size: 8px; line-height: 1.3; position: relative;
        }
        .pro-node:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); border-color: var(--border-focus); }
        .pro-node.active-source { border: 2px solid var(--color-success); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2), var(--shadow-lg); }

        .node-banner {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 10px; background: var(--bg-card-subtle);
            border-bottom: 1px solid var(--border-color); gap: 8px;
        }
        .banner-left { display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 8px; flex-shrink: 0; }
        .banner-icon { width: 20px; height: 20px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; }
        .banner-icon.reseau { background: var(--icon-reseau); }
        .banner-icon.onduleur { background: var(--icon-onduleur); }
        .banner-center { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; }
        .banner-volt { font-size: 10px; font-weight: 700; font-family: monospace; color: var(--text-primary); line-height: 1; }
        .banner-volt-unit { font-size: 8px; color: var(--text-muted); font-weight: 500; margin-left: 2px; }
        .banner-status { display: flex; align-items: center; gap: 4px; font-size: 8px; font-weight: 500; }
        .banner-status.online { color: var(--color-success); }
        .banner-status.offline { color: var(--text-muted); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-success); }
        .status-dot.off { background: var(--text-muted); }
        .banner-badge { padding: 3px 8px; border-radius: 12px; font-size: 9px; font-weight: 600; flex-shrink: 0; }
        .badge-ok { background: var(--color-success-bg); color: var(--color-success); }
        .badge-warn { background: var(--color-warning-bg); color: var(--color-warning); }
        .badge-err { background: var(--color-danger-bg); color: var(--color-danger); }

        .volt-bar-row { height: 3px; background: var(--border-color); border-radius: 2px; margin: 0; overflow: hidden; }
        .volt-bar-fill { height: 100%; border-radius: 2px; transition: width 0.2s, background 0.2s; }
        .volt-bar-fill.ok { background: var(--color-success); }
        .volt-bar-fill.warn { background: var(--color-warning); }
        .volt-bar-fill.err { background: var(--color-danger); }

        .data-strip { display: grid; grid-template-columns: repeat(4, 1fr); padding: 6px 10px; gap: 4px; background: var(--bg-card-subtle); }
        .data-chip { background: var(--bg-card); padding: 4px 3px; border-radius: var(--radius-sm); text-align: center; border: 1px solid var(--border-color); }
        .data-chip-label { font-size: 7px; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 2px; letter-spacing: 0.3px; }
        .data-chip-value { font-size: 8px; font-weight: 600; font-family: monospace; color: var(--text-primary); }
        .data-chip-value.ok { color: var(--color-success); }

        .node-footer { padding: 6px 10px 8px; border-top: 1px solid var(--border-color); background: var(--bg-card); }
        .btn-force { width: 100%; padding: 5px; border: none; border-radius: var(--radius-md); font-size: 8px; font-weight: 600; cursor: pointer; transition: 0.15s; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .btn-force:active { transform: scale(0.97); }
        .btn-force:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-warn { background: var(--color-warning); color: white; }
        .btn-warn:hover:not(:disabled) { background: #d97706; }
        .btn-prim { background: var(--color-primary); color: white; }
        .btn-prim:hover:not(:disabled) { background: var(--color-primary-hover); }
        .btn-danger { background: var(--color-danger); color: white; }
        .btn-danger:hover:not(:disabled) { background: #dc2626; }

        .ats-node .node-head { border-bottom: 2px solid var(--color-ats); }
        .ats-sw { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 0 10px 6px; }
        .sw-card { 
            background: var(--bg-card-subtle); border-radius: var(--radius-md); 
            padding: 4px 6px; text-align: left; border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; gap: 4px;
        }
        .sw-label { font-size: 7px; color: var(--text-muted); text-transform: uppercase; white-space: nowrap; }
        .sw-val { font-size: 9px; font-weight: 700; white-space: nowrap; }
        .sw-val.closed { color: var(--color-success); } .sw-val.open { color: var(--text-muted); }
        
        .info-row { display: flex; justify-content: space-between; padding: 4px 10px; border-bottom: 1px dashed var(--border-color); font-size: 8px; }
        .info-row:last-child { border-bottom: none; }
        .info-key { font-size: 8px; color: var(--text-muted); }
        .info-val { font-weight: 600; }
        .info-val.warn { color: var(--color-warning); } .info-val.err { color: var(--color-danger); } .info-val.ok { color: var(--color-success); }
        
        .info-row-combined { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            padding: 4px 10px; border-bottom: 1px dashed var(--border-color); font-size: 8px;
        }
        .info-combined { display: flex; justify-content: space-between; align-items: center; }
        
        .toggle-compact {
            position: relative; width: 26px; height: 14px;
            background: var(--border-color); border-radius: 14px;
            transition: 0.2s; flex-shrink: 0; cursor: pointer;
        }
        .toggle-compact.on { background: var(--color-success); }
        .toggle-compact::after {
            content: ""; position: absolute; width: 10px; height: 10px;
            background: white; border-radius: 50%; top: 2px; left: 2px;
            transition: 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .toggle-compact.on::after { transform: translateX(12px); }
        
        .node-foot { padding: 6px 10px 8px; border-top: 1px solid var(--border-color); background: var(--bg-card-subtle); display: flex; flex-direction: column; gap: 5px; }

        .react-flow__handle { opacity: 0.8; transition: 0.15s; } .react-flow__handle:hover { opacity: 1; }
        .handle-right { width: 10px !important; height: 10px !important; background: var(--color-success) !important; border: 2px solid var(--bg-card) !important; box-shadow: 0 0 0 2px var(--color-success) !important; }
        .handle-top { width: 10px !important; height: 10px !important; background: var(--color-success) !important; border: 2px solid var(--bg-card) !important; box-shadow: 0 0 0 2px var(--color-success) !important; }
        .handle-left { width: 10px !important; height: 10px !important; background: var(--color-ats) !important; border: 2px solid var(--bg-card) !important; box-shadow: 0 0 0 2px var(--color-ats) !important; }
        .handle-bottom { width: 10px !important; height: 10px !important; background: var(--color-ats) !important; border: 2px solid var(--bg-card) !important; box-shadow: 0 0 0 2px var(--color-ats) !important; }

        .react-flow__node { padding: 0; border: none; background: transparent; }
        .react-flow__edge-path { stroke-width: 2.5; stroke-dasharray: 5 4; animation: dash-flow 1s linear infinite; }
        @keyframes dash-flow { to { stroke-dashoffset: -9; } }
        
        .top-bar { position: absolute; top: 12px; left: 12px; z-index: 1000; background: var(--bg-card); padding: 8px 14px; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); display: flex; gap: 10px; align-items: center; border: 1px solid var(--border-color); }
        .top-bar a { text-decoration: none; color: var(--color-primary); font-weight: 500; font-size: 8px; display: flex; align-items: center; gap: 3px; }
        .top-bar a:hover { color: var(--color-primary-hover); }
        .bar-sep { width: 1px; height: 14px; background: var(--border-color); }
        .theme-toggle { background: var(--bg-card-subtle); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 4px 8px; font-size: 8px; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
        .theme-toggle:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        @keyframes pulse-soft { 0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.3)} 50%{box-shadow:0 0 0 4px rgba(16,185,129,0)} }
        .node-active-source { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;
        const { ReactFlow, Controls, Background, MarkerType, Handle, Position } = window.ReactFlow;

        const getVoltLevel = (v, max) => Math.min(100, Math.max(0, ((parseInt(v)||0) / (parseInt(max)||400)) * 100));
        const getStatusBadge = (s) => {
            if(!s) return {cls:"badge-ok", txt:"✓ OK"};
            const l=s.toLowerCase();
            if(l.includes("normal")||l.includes("ok")) return {cls:"badge-ok", txt:"✓ OK"};
            if(l.includes("sous-tension")||l.includes("attention")) return {cls:"badge-warn", txt:"⚠ Attention"};
            if(l.includes("surtension")||l.includes("erreur")||l.includes("fault")) return {cls:"badge-err", txt:"✗ Erreur"};
            return {cls:"badge-ok", txt:"✓ OK"};
        };

        const ReseauNode = ({ data }) => {
            const active = data.sw2 === 'Fermé' || data.sw2 === '✅ Fermé';
            const status = data.s2a || "Normal";
            const badge = getStatusBadge(status);
            const vLevel = getVoltLevel(data.v2a, data.max2);
            const connected = (parseInt(data.v2a)||0) > 50;
            const vClass = status.toLowerCase().includes("normal") ? "ok" : status.toLowerCase().includes("sous") ? "warn" : "err";

            return (
                <div className={`pro-node ${active ? 'active-source node-active-source' : ''}`}>
                    <Handle type="source" position={Position.Right} id="reseau-out" className="handle-right" />
                    <div className="node-banner">
                        <div className="banner-left"><div className="banner-icon reseau">⚡</div><span>Réseau</span></div>
                        <div className="banner-center">
                            <span className="banner-volt">{data.v2a || '--'}<span className="banner-volt-unit"></span></span>
                            <span className={`banner-status ${connected ? 'online' : 'offline'}`}>
                                <span className={`status-dot ${connected ? '' : 'off'}`}></span>
                                {connected ? 'En ligne' : 'Hors ligne'}
                            </span>
                        </div>
                        <span className={`banner-badge ${badge.cls}`}>{badge.txt}</span>
                    </div>
                    <div className="volt-bar-row"><div className={`volt-bar-fill ${vClass}`} style={{width: `${vLevel}%`}}></div></div>
                    <div className="data-strip">
                        <div className="data-chip"><span className="data-chip-label">SW2</span><span className={`data-chip-value ${active?'ok':''}`}>{data.sw2||'--'}</span></div>
                        <div className="data-chip"><span className="data-chip-label">Max</span><span className="data-chip-value">{data.max2||'--'}</span></div>
                        <div className="data-chip"><span className="data-chip-label">Nbr</span><span className="data-chip-value">{data.cnt2||0}</span></div>
                        <div className="data-chip"><span className="data-chip-label">T2</span><span className="data-chip-value">{data.t2||0}s</span></div>
                    </div>
                    <div className="node-footer">
                        <button className="btn-force btn-warn" onClick={()=>data.onForce?.(2)} disabled={data.disabled}>
                            ⚡ {data.disabled ? 'Traitement...' : 'Forcer Réseau'}
                        </button>
                    </div>
                </div>
            );
        };

        const OnduleurNode = ({ data }) => {
            const active = data.sw1 === 'Fermé' || data.sw1 === '✅ Fermé';
            const status = data.s1a || "Normal";
            const badge = getStatusBadge(status);
            const vLevel = getVoltLevel(data.v1a, data.max1);
            const connected = (parseInt(data.v1a)||0) > 50;
            const vClass = status.toLowerCase().includes("normal") ? "ok" : status.toLowerCase().includes("sous") ? "warn" : "err";

            return (
                <div className={`pro-node ${active ? 'active-source node-active-source' : ''}`}>
                    <Handle type="source" position={Position.Top} id="onduleur-out" className="handle-top" />
                    <div className="node-banner">
                        <div className="banner-left"><div className="banner-icon onduleur">🔋</div><span>Onduleur</span></div>
                        <div className="banner-center">
                            <span className="banner-volt">{data.v1a || '--'}<span className="banner-volt-unit"></span></span>
                            <span className={`banner-status ${connected ? 'online' : 'offline'}`}>
                                <span className={`status-dot ${connected ? '' : 'off'}`}></span>
                                {connected ? 'En ligne' : 'Hors ligne'}
                            </span>
                        </div>
                        <span className={`banner-badge ${badge.cls}`}>{badge.txt}</span>
                    </div>
                    <div className="volt-bar-row"><div className={`volt-bar-fill ${vClass}`} style={{width: `${vLevel}%`}}></div></div>
                    <div className="data-strip">
                        <div className="data-chip"><span className="data-chip-label">SW1</span><span className={`data-chip-value ${active?'ok':''}`}>{data.sw1||'--'}</span></div>
                        <div className="data-chip"><span className="data-chip-label">Max</span><span className="data-chip-value">{data.max1||'--'}</span></div>
                        <div className="data-chip"><span className="data-chip-label">Nbr</span><span className="data-chip-value">{data.cnt1||0}</span></div>
                        <div className="data-chip"><span className="data-chip-label">T1</span><span className="data-chip-value">{data.t1||0}s</span></div>
                    </div>
                    <div className="node-footer">
                        <button className="btn-force btn-prim" onClick={()=>data.onForce?.(1)} disabled={data.disabled}>
                            🔋 {data.disabled ? 'Traitement...' : 'Forcer Onduleur'}
                        </button>
                    </div>
                </div>
            );
        };

        const ATSNode = ({ data }) => {
            const remoteOn = data.swRemote === "📡 Activé" || data.swRemote === "Activé";
            const fault = data.swFault || "Aucun";
            const hasFault = fault !== "Aucun" && fault !== "None";
            const centerOff = data.middleOFF?.includes('Activé');
            const disabled = data.disabled || false;

            return (
                <div className="pro-node ats-node">
                    <Handle type="target" position={Position.Left} id="ats-in-reseau" className="handle-left" />
                    <Handle type="target" position={Position.Bottom} id="ats-in-onduleur" className="handle-bottom" />
                    
                    {/* HEADER ATS avec Télécommande sur la même ligne */}
                    <div className="node-head" style={{display:'flex', justifyContent:'space-between', alignItems:'center', padding:'7px 10px', background:'var(--bg-card-subtle)', borderBottom:'2px solid var(--color-ats)', gap:8}}>
                        <div style={{display:'flex', alignItems:'center', gap:5, fontWeight:600, fontSize:10}}>
                            <div style={{width:18, height:18, background:'var(--icon-ats)', borderRadius:4, display:'flex', alignItems:'center', justifyContent:'center', color:'white', fontSize:11}}>🔀</div>
                            <span>ATS</span>
                        </div>
                        
                        <div style={{display:'flex', alignItems:'center', gap:6, cursor: disabled ? 'default' : 'pointer', opacity: disabled ? 0.5 : 1}} onClick={!disabled ? data.onToggleRemote : undefined}>
                            <span style={{fontSize:8, color:'var(--text-secondary)', fontWeight:500}}>Télécommande</span>
                            <div className={`toggle-compact ${remoteOn?'on':''}`}></div>
                        </div>
                        
                        <span className={`banner-badge ${remoteOn?'badge-ok':'badge-warn'}`}>{remoteOn?"📡 ON":" OFF"}</span>
                    </div>
                    
                    <div className="ats-sw">
                        <div className="sw-card">
                            <span className="sw-label">SW1</span>
                            <span className={`sw-val ${(data.sw1==='Fermé'||data.sw1==='✅ Fermé')?'closed':'open'}`}>{data.sw1||'Ouvert'}</span>
                        </div>
                        <div className="sw-card">
                            <span className="sw-label">SW2</span>
                            <span className={`sw-val ${(data.sw2==='Fermé'||data.sw2==='✅ Fermé')?'closed':'open'}`}>{data.sw2||'Ouvert'}</span>
                        </div>
                    </div>
                    
                    <div className="info-row-combined">
                        <div className="info-combined"><span className="info-key">Mode</span><span className="info-val">{data.swMode||'---'}</span></div>
                        <div className="info-combined"><span className="info-key">Défaut</span><span className={`info-val ${hasFault?'err':'ok'}`}>{hasFault?`⚠ ${fault}`:"✓ Aucun"}</span></div>
                    </div>
                    
                    <div className="info-row"><span className="info-key">Position</span><span className={`info-val ${centerOff?'err':''}`}>{data.middleOFF||'Normale'}</span></div>
                    
                    <div className="node-foot">
                        <button className="btn-force btn-danger" onClick={data.onForceOff} disabled={disabled}>
                            ⏹️ {disabled ? 'Traitement...' : 'Centrale: OFF'}
                        </button>
                    </div>
                </div>
            );
        };

        const nodeTypes = { reseau: ReseauNode, onduleur: OnduleurNode, ats: ATSNode };

        function App() {
            const [theme, setTheme] = useState(() => localStorage.getItem('ats-theme') || 'light');
            const [isProcessing, setIsProcessing] = useState(false);
            const [apiData, setApiData] = useState({ 
                v1a:'0',v2a:'0',sw1:'Ouvert',sw2:'Ouvert',s1a:'Normal',s2a:'Normal',
                swRemote:'Désactivé',swMode:'Auto',swFault:'Aucun',middleOFF:'Désactivé',operation_mode:'N/A',
                cnt1:'0',cnt2:'0',t1:'0',t2:'0',max1:'400',max2:'400'
            });

            useEffect(() => { document.documentElement.setAttribute('data-theme', theme); localStorage.setItem('ats-theme', theme); }, [theme]);
            const toggleTheme = () => setTheme(t => t==='light'?'dark':'light');

            const fetchData = useCallback(async () => {
                try { 
                    const r = await fetch('/api/read_all', { cache: 'no-cache' }); 
                    const j = await r.json(); 
                    if(j.success && j.values) setApiData(p=>({...p,...j.values})); 
                } catch(e) { console.error("Fetch err",e); }
            }, []);

            const executeCommand = async (steps) => {
                if (isProcessing) return;
                setIsProcessing(true);
                try {
                    for (const step of steps) {
                        if (typeof step === 'string') {
                            await fetch('/api/' + step, { method: 'POST', cache: 'no-cache' });
                        } else if (typeof step === 'number') {
                            await new Promise(r => setTimeout(r, step));
                        }
                    }
                    await new Promise(r => setTimeout(r, 600));
                    await fetchData();
                } catch (e) {
                    console.error("Command failed:", e);
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleForceSource = async(id) => {
                const cmd = id === 1 ? 'force_source1' : 'force_source2';
                await executeCommand(['remote_on', 200, cmd, 'remote_off']);
            };

            const handleToggleRemote = async() => {
                const isOn = apiData.swRemote === "📡 Activé" || apiData.swRemote === "Activé";
                const cmd = isOn ? 'remote_off' : 'remote_on';
                await executeCommand([cmd, 300]);
            };

            const handleForceOff = async() => {
                if(window.confirm("⚠️ Confirmer l'arrêt complet (Double OFF) ?")) {
                    await executeCommand(['remote_on', 200, 'force_double', 'remote_off']);
                }
            };

            const baseNodes = useMemo(()=>[
                {id:'reseau',type:'reseau',position:{x:-300,y:80},draggable:false},
                {id:'ats',type:'ats',position:{x:0,y:72},draggable:false},
                {id:'onduleur',type:'onduleur',position:{x:0,y:270},draggable:false}
            ],[]);

            useEffect(()=>{ fetchData(); const id=setInterval(fetchData,5000); return()=>clearInterval(id); },[fetchData]);

            // ✅ CONSTRUCTION EXPLICITE ET FOOLPROOF DES NODES
            const nodesWithData = useMemo(() => {
                return baseNodes.map(n => {
                    const nodeData = { ...apiData, disabled: isProcessing };
                    
                    if (n.id === 'reseau') nodeData.onForce = () => handleForceSource(2);
                    else if (n.id === 'onduleur') nodeData.onForce = () => handleForceSource(1);
                    else if (n.id === 'ats') {
                        nodeData.onToggleRemote = handleToggleRemote;
                        nodeData.onForceOff = handleForceOff;
                    }

                    // Retour explicite avec la clé `data` garantie
                    return {
                        id: n.id,
                        type: n.type,
                        position: n.position,
                        draggable: n.draggable,
                        data: nodeData
                    };
                });
            }, [apiData, baseNodes, isProcessing]);

            const sw1C = apiData.sw1?.includes("Fermé");
            const sw2C = apiData.sw2?.includes("Fermé");
            const midOff = apiData.middleOFF?.includes("Activé");

            const edges = useMemo(()=>{
                if(midOff) return [];
                const e=[];
                if(sw1C && !sw2C) e.push({id:'e1',source:'onduleur',target:'ats',sourceHandle:'onduleur-out',targetHandle:'ats-in-onduleur',animated:true,style:{stroke:'var(--edge-active)',strokeWidth:2.5,strokeDasharray:'5 4'},markerEnd:{type:MarkerType.ArrowClosed,color:'var(--edge-active)',width:16,height:16},type:'smoothstep'});
                else if(sw2C && !sw1C) e.push({id:'e2',source:'reseau',target:'ats',sourceHandle:'reseau-out',targetHandle:'ats-in-reseau',animated:true,style:{stroke:'var(--edge-active)',strokeWidth:2.5,strokeDasharray:'5 4'},markerEnd:{type:MarkerType.ArrowClosed,color:'var(--edge-active)',width:16,height:16},type:'smoothstep'});
                else if(sw1C && sw2C) e.push(
                    {id:'e1',source:'onduleur',target:'ats',sourceHandle:'onduleur-out',targetHandle:'ats-in-onduleur',animated:true,style:{stroke:'var(--edge-active)',strokeWidth:2.5,strokeDasharray:'5 4'},markerEnd:{type:MarkerType.ArrowClosed,color:'var(--edge-active)',width:16,height:16},type:'smoothstep'},
                    {id:'e2',source:'reseau',target:'ats',sourceHandle:'reseau-out',targetHandle:'ats-in-reseau',animated:true,style:{stroke:'var(--edge-ats)',strokeWidth:2.5,strokeDasharray:'5 4'},markerEnd:{type:MarkerType.ArrowClosed,color:'var(--edge-ats)',width:16,height:16},type:'smoothstep'}
                );
                return e;
            },[sw1C,sw2C,midOff]);

            return (
                <div style={{width:'100%',height:'100%'}}>
                    <div className="top-bar">
                        <a href="index.html">← Retour</a><div className="bar-sep"></div>
                        <span style={{color:'var(--text-secondary)',fontSize:9}}>📊 ATS • 5s</span>
                        <button className="theme-toggle" onClick={toggleTheme}>{theme==='light'?'🌙 Sombre':'☀️ Clair'}</button>
                    </div>
                    <ReactFlow nodes={nodesWithData} edges={edges} nodeTypes={nodeTypes} fitView fitViewOptions={{padding:0.3}} defaultViewport={{x:0,y:0,zoom:0.9}} nodesConnectable={false} nodesDraggable={false} panOnDrag zoomOnScroll minZoom={0.5} maxZoom={2} edgesConnectable={false}>
                        <Background color="var(--border-color)" gap="16" size="1"/>
                        <Controls showInteractive={false} style={{boxShadow:'var(--shadow-md)',borderRadius:'var(--radius-md)',background:'var(--bg-card)',border:'1px solid var(--border-color)'}}/>
                    </ReactFlow>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
